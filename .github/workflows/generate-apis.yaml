name: Generate APIs
on:
  push:
    branches:
      - "main"
permissions:
  deployments: write
  contents: write
  statuses: write
  actions: write
  packages: write
  checks: read
jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Setup Go 1.21.x
        uses: actions/setup-go@v5
        with:
          # Semantic version range syntax or exact version of Go
          go-version: '1.21.x'
      - name: Checkout go-genproto
        uses: actions/checkout@v4
        with:
          repository: smallbiznis/go-genproto
          token: ${{ secrets.ACCESS_TOKEN }}
          path: gen
      - name: Generate APIs
        run: |
          go install \
          github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway \
          google.golang.org/protobuf/cmd/protoc-gen-go \
          google.golang.org/grpc/cmd/protoc-gen-go-grpc
          make LANGUAGE=go OUTPUT=gen 
      - name: Check for changes
        id: check_changes
        run: |
          cd gen
          git status --porcelain
          echo "name=changes::$(git status --porcelain)" >> >> $GITHUB_OUTPUT
      - name: Commit changes
        if: steps.check_changes.outputs.changes != ''
        run: |
          git config user.name "Small Biznis APIs"
          git add .
          git commit -m "regenerate API"
          git push
  build-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          # Semantic version range syntax or exact version of Go
          node-version: 18
      - name: Checkout ts-genproto
        uses: actions/checkout@v4
        with:
          repository: smallbiznis/ts-genproto
          token: ${{ secrets.ACCESS_TOKEN }}
          path: gen
      - name: Generate APIs
        run: |
          npm install --save-dev grpc-tools grpc_tools_node_protoc_ts
          make LANGUAGE=ts OUTPUT=gen
      - name: Check for changes
        id: check_changes
        run: |
          cd gen
          git status --porcelain
          echo "name=changes::$(git status --porcelain)" >> >> $GITHUB_OUTPUT
      - name: Commit changes
        run: |
          cd gen
          git config user.name "Small Biznis APIs"
          git add .
          git commit -m "regenerate API"
          git push