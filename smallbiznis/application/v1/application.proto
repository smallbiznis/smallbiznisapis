syntax = "proto3";

package smallbiznis.application.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/application/v1;application";

import "smallbiznis/application/v1/application_resource.proto";
import "smallbiznis/protobuf/empty.proto";

import "google/api/field_behavior.proto";
import "google/api/annotations.proto";

message ListAppRequest {
  int32 page = 1;

  int32 size = 2;

  string sort_by = 3;

  enum OrderBy {

    ASC = 0;

    DESC = 1;

  }

  OrderBy order_by = 4;

  string title = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListAppResponse {
  repeated Application data = 1;
  int32 total_data = 2;
}

message GetAppRequest {
  string app_id = 1;
}

service ApplicationService {

  rpc ListApp(ListAppRequest) returns (ListAppResponse) {
    option (google.api.http) = {
      get: "/v1/applications"
    };
  }

  rpc GetApp(GetAppRequest) returns (Application) {
    option (google.api.http) = {
      get: "/v1/applications/{app_id}"
    };
  }

  rpc CreateApp(Application) returns (Application) {
    option (google.api.http) = {
      post: "/v1/applications"
      body: "*"
    };
  }

  rpc UpdateApp(Application) returns (Application) {
    option (google.api.http) = {
      put: "/v1/applications/{app_id}"
      body: "*"
    };
  }

}