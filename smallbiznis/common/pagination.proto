syntax = "proto3";

package smallbiznis.common;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/common;common";

import "google/protobuf/wrappers.proto";

message CursorRequest {
  string cursor = 1; // opaque cursor provided by previous response
  google.protobuf.Int32Value limit = 2; // optional page size override
}

message CursorResponse {
  string next_cursor = 1;
  string prev_cursor = 2;
  int32 total_count = 3;
}
