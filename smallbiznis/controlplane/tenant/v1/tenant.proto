syntax = "proto3";

package smallbiznis.controlplane.tenant.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/controlplane/tenant/v1;tenantv1";

// ======================================
// TenantService
// ======================================
service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (Tenant) {
    option (google.api.http) = {
      post: "/v1/tenants"
      body: "*"
    };
  }

  rpc GetTenant(GetTenantRequest) returns (Tenant) {
    option (google.api.http) = {
      get: "/v1/tenants/{tenant_id}"
    };
  }

  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
    option (google.api.http) = {
      get: "/v1/tenants"
    };
  }

  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant) {
    option (google.api.http) = {
      patch: "/v1/tenants/{tenant_id}"
      body: "*"
    };
  }

  rpc DeleteTenant(DeleteTenantRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/tenants/{tenant_id}"
    };
  }
}

message Tenant {
  string tenant_id = 1;
  string type = 2;
  string name = 3;
  string slug = 4;
  string country_code = 5; // ISO alpha-2
  string timezone = 6; // Asia/Jakarta
  string status = 7; // pending, provisioning, active, suspended, archived
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string code = 10;
}

message CreateTenantRequest {
  string name = 1;
  string slug = 2;
  string country_code = 3; // ISO alpha-2
  string timezone = 4; // Asia/Jakarta
  string type = 5; // company, personal
}

message GetTenantRequest {
  string tenant_id = 1;
}

message ListTenantsRequest {
  string cursor = 1;
  int32 limit = 2;
}

message ListTenantsResponse {
  repeated Tenant tenants = 1;
}

message UpdateTenantRequest {
  string tenant_id = 1;
  string name = 2;
  string status = 4;
}

message DeleteTenantRequest {
  string tenant_id = 1;
}
