syntax = "proto3";

package smallbiznis.inventory.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

enum StockSource {
  STOCK_SOURCE_UNSPECIFIED = 0;
  INTERNAL = 1;
  EXTERNAL = 2;
}

// For source=EXTERNAL, InventoryService delegates stock read/update to adapter plugins.
// Example:
// - ULTRAVOUCHER → fetch stock availability via provider API
// - WAREHOUSE_API → fetch SKU quantity
// Internal stock still stored in local DB (inventory_items table).
// Unified interface ensures frontends and RuleEngine can query stock consistently.

// INVENTORY ITEM
message InventoryItem {
  string inventory_item_id = 1;
  string location_id = 2;
  string variant_id = 3;
  int32 on_hand_quantity = 4;
  int32 reserved_quantity = 5;
  int32 incoming_quantity = 6; // optional, future-proof
  string external_id = 8; // reference id from external provider
  string provider = 9; // e.g. "ultravoucher", "supplier_a"
  StockSource source = 10; // INTERNAL or EXTERNAL
  map<string, string> provider_metadata = 11; // e.g. available_quantity, redeem_url
}

message InventoryMovement {
  string movement_id = 1;
  string org_id = 2;
  string variant_id = 3;
  string location_id = 4;
  AdjustType movement_type = 5;
  int32 quantity = 6;
  string reference_id = 7;
  string note = 8;
  google.protobuf.Timestamp created_at = 9;
}

message CreateInventoryItemRequest {
  string org_id = 1;
  string location_id = 2;
  string variant_id = 3;
  int32 quantity = 4;
}

// REQUEST / RESPONSE
message GetVariantInventoryRequest {
  string variant_id = 1;
  string org_id = 2;
}

message GetVariantInventoryResponse {
  repeated InventoryItem inventories = 1;
}

message ListLocationInventoryRequest {
  string location_id = 1;
  string org_id = 2;
  smallbiznis.common.CursorRequest page = 3;
}

message ListLocationInventoryResponse {
  repeated InventoryItem inventories = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message UpdateInventoryRequest {
  string inventory_item_id = 1;
  int32 quantity = 2;
  int32 reserved_quantity = 3;
  int32 incoming_quantity = 4;
}

message UpdateInventoryResponse {
  InventoryItem inventory = 1;
}

message ListInventoryMovementsRequest {
  string org_id = 1;
  string variant_id = 2;
  string location_id = 3;
  smallbiznis.common.CursorRequest page = 4;
}

message ListInventoryMovementsResponse {
  repeated InventoryMovement movements = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message ListStockSourcesRequest {}

message ListStockSourcesResponse {
  repeated string providers = 1;
}

message SyncExternalStockRequest {
  string provider = 1; // "ultravoucher"
  string external_id = 2;
  string variant_id = 3;
  map<string, string> metadata = 4;
}

message SyncExternalStockResponse {
  repeated InventoryItem items = 1;
}

// ----------------------------
// Adjust / Transfer stock
// ----------------------------
enum AdjustType {
  ADJUST_TYPE_UNSPECIFIED = 0;
  SUPPLIER_RESTOCK = 1;
  MANUAL_ADJUST = 2;
}

message TransferInventoryRequest {
  string org_id = 1;
  string variant_id = 2;
  string from_location_id = 3;
  string to_location_id = 4;
  int32 quantity = 5;
}

message TransferInventoryResponse {
  repeated InventoryItem inventories = 1;
}

message AdjustInventoryRequest {
  string inventory_item_id = 1;
  string org_id = 2;
  int32 adjust_quantity = 3;
  AdjustType adjust_type = 4;
  string note = 5;
}

message AdjustInventoryResponse {
  InventoryItem inventory = 1;
}

// SERVICE
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis Inventory API";
    version: "1.0";
    description: "Multi-tenant Inventory Service API for SmallBiznis";
    contact: { name: "SmallBiznis project"; url: "https://github.com/smallbiznis"; email: "taufiktriantono4@gmail.com"; };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

service InventoryService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Inventory"
    description: "APIs to manage inventory."
  };

  rpc CreateVariantInventory(CreateInventoryItemRequest) returns (InventoryItem) {
    option (google.api.http) = {
      post: "/v1/inventory"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Create an inventory" operation_id: "Inventory_Create";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc GetVariantInventory(GetVariantInventoryRequest) returns (GetVariantInventoryResponse) {
    option (google.api.http) = {
      get: "/v1/inventory/variants/{variant_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Get an inventory" operation_id: "Inventory_Get";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc ListLocationInventory(ListLocationInventoryRequest) returns (ListLocationInventoryResponse) {
    option (google.api.http) = {
      get: "/v1/inventory/locations/{location_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "List a inventory" operation_id: "Inventory_List";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc UpdateInventory(UpdateInventoryRequest) returns (UpdateInventoryResponse) {
    option (google.api.http) = {
      put: "/v1/inventory/{inventory_item_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Update an inventory" operation_id: "Inventory_Update";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc TransferInventory(TransferInventoryRequest) returns (TransferInventoryResponse) {
    option (google.api.http) = {
      post: "/v1/inventory/transfer"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Transfer an inventory" operation_id: "Inventory_Transfer"
      description: "Transfers inventory between locations and publishes VariantStockEvent updates for both locations."
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc AdjustInventory(AdjustInventoryRequest) returns (AdjustInventoryResponse) {
    option (google.api.http) = {
      post: "/v1/inventory/{inventory_item_id}/adjust"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Adjust an inventory" operation_id: "Inventory_Adjust"
      description: "Adjusts inventory quantities and publishes a VariantStockEvent for downstream subscribers."
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc ListInventoryMovements(ListInventoryMovementsRequest) returns (ListInventoryMovementsResponse) {
    option (google.api.http) = {
      get: "/v1/inventory/movements"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory"
      summary: "List inventory movements"
      operation_id: "InventoryMovement_List"
      description: "Retrieve a paginated list of inventory movements (adjustments, transfers, restocks) for auditing and reporting."
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc ListStockSources(ListStockSourcesRequest) returns (ListStockSourcesResponse) {
    option (google.api.http) = {
      get: "/v1/inventory/sources"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "List external stock sources" operation_id: "Inventory_ListStockSources";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc SyncExternalStock(SyncExternalStockRequest) returns (SyncExternalStockResponse) {
    option (google.api.http) = {
      post: "/v1/inventory/sync-external"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Inventory" summary: "Sync external stock" operation_id: "Inventory_SyncExternalStock";
      description: "Sync external stock availability into the unified inventory model.";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }
}
