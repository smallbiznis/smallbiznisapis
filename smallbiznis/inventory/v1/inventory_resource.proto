syntax = "proto3";

package smallbiznis.inventory.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/inventory/v1;inventory";

import "google/protobuf/timestamp.proto";

message InventoryItem {

  string inventory_item_id = 1;

  string organization_id = 2;

  string location_id = 3;

  string sku = 4;

  int32 quantity = 5;

  int32 reorder_level = 6;

  google.protobuf.Timestamp created_at = 7;

  google.protobuf.Timestamp updated_at = 8;

}

enum Status {

  ACTIVE = 0;

  INACTIVE = 1;

  ARCHIVED = 2;

}

message Option {

  string option_id = 1;

  string organization_id = 2;

  string option_key = 3;

  string option_name = 4;

  repeated string option_values = 5;

}

message Tag {

  string tag_id = 1;

  string organization_id = 2;

  string name = 3;

}

message Product {

  string product_id = 1;

  string organization_id = 2;

  string slug = 3;

  string title = 4;

  string body_html = 5;

  Status status = 6;

  repeated Option options = 7;

  repeated Variant variants = 8;

  repeated string tags = 9;

  google.protobuf.Timestamp created_at = 10;

  google.protobuf.Timestamp updated_at = 11;

}

message Variant {

  string variant_id = 1;

  string product_id = 2;

  string sku = 3;

  float price = 4;

  float cost = 5;

  repeated string attributes = 6;

  repeated string inventory_item_ids = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

}