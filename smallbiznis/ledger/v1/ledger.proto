syntax = "proto3";

package smallbiznis.ledger.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/ledger/v1;ledgerv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// OpenAPI (Swagger v2) top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/";
  consumes: "application/json";
  produces: "application/json";
};

service LedgerService {

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Ledger"
    description: "APIs for manage organization and sub organization (create, update, list, delete)"
  };

  rpc AddEntry(AddEntryRequest) returns (LedgerEntry) {
    option (google.api.http) = {
      post: "/v1/entries"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Ledger"
      operation_id: "Ledger_Add_Entry"
      summary: "Create an Entry"
      description: "Creates a new entry with the provided attributes. Returns the created entry on success."
      // Uncomment if you use JWT/Bearer
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  };

  rpc RevertEntry(RevertEntryRequest) returns (LedgerEntry);

  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse) {
    option (google.api.http) = {
      get: "/v1/entries"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Ledger"
      operation_id: "Ledger_List"
      summary: "List ledgefr"
      description: "Returns a paginated list of ledgefr. Use query parameters such as `cursor` and `limit` when available."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  };

  rpc GetEntry(GetEntryRequest) returns (LedgerEntry) {

    option (google.api.http) = {
      get: "/v1/entries/{id}"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Ledger"
      operation_id: "Ledger_Get_Entry"
      summary: "Get entry details"
      description: "Retrieves an entry by its unique identifier. Returns 404 if the entry does not exist."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  };

  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);

  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse) {};
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  CREDIT = 1;
  DEBIT = 2;
}

message LedgerEntry {
  string id = 1;
  string organization_id = 2;
  string user_id = 3;
  EntryType type = 4;
  string transaction_id = 5;
  string reference_id = 6;
  int64 amount = 7;
  string description = 8;
  map<string, string> metadata = 9;
  google.protobuf.Timestamp created_at = 10;
}

message AddEntryRequest {
  string organization_id = 1;
  string user_id = 2;
  EntryType type = 3; // fixed: was undefined type
  int64 amount = 4;
  string description = 5;
  string reference_id = 6;
  map<string, string> metadata = 7;
}

message RevertEntryRequest {
  string entry_id = 1;
  string reason = 2;
}

message ListEntriesRequest {
  string organization_id = 1;
  string user_id = 2;
}

message ListEntriesResponse {
  repeated LedgerEntry data = 1;
}

message GetEntryRequest {
  string id = 1;
}

message VerifyChainRequest {
  string organization_id = 1;
  string user_id = 2;
}

message VerifyChainResponse {
  bool valid = 1;
  string message = 2;
}

message GetBalanceRequest {
  string user_id = 1;
  string organization_id = 2;
}

message GetBalanceResponse {
  int64 balance = 1;
  google.protobuf.Timestamp last_updated_at = 2;
}