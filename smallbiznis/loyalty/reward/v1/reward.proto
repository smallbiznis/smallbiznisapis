syntax = "proto3";

package smallbiznis.loyalty.reward.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/loyalty/reward/v1;rewardv1";

import "google/protobuf/timestamp.proto";

import "protoc-gen-openapiv2/options/annotations.proto";

// OpenAPI (Swagger v2) top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  schemes: HTTPS;
  base_path: "/";
  consumes: "application/json";
  produces: "application/json";
};

service RewardService {}

message VoucherReward {
  string code = 1;
  string provider = 2;
  string value_currency = 3;
  double value_amount = 4;
  google.protobuf.Timestamp expired_at = 5;
}

message PhysicalReward {
  string product_id = 1;
  string name = 2;
  string image_url = 3;
  string shipping_address_id = 4;
  string tracking_number = 5;
}