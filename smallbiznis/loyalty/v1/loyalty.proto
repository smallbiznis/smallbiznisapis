syntax = "proto3";

package smallbiznis.loyalty.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/loyalty/v1;loyaltyv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// Internal Common
import "smallbiznis/common/money.proto";
import "smallbiznis/transaction/v1/transaction.proto";

// OpenAPI top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Loyalty API for earning and redemption flows";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test";
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

// ──────────────────────────────
//  Service
// ──────────────────────────────

service PointService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Loyalty"
    description: "APIs for managing loyalty earning and redemption flows"
  };

  rpc AddPoint(AddPointsRequest) returns (AddPointsResponse);

  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse) {
    option (google.api.http) = {
      get: "/v1/points:balance"
    };
  };

  rpc RunExpiryJob(RunExpiryJobRequest) returns (RunExpiryJobResponse);

  rpc GetExpiringPoints(GetExpiringPointsRequest) returns (GetExpiringPointsResponse) {
    option (google.api.http) = {
      get: "/v1/points:expiring"
    };
  }

  rpc Earning(EarningRequest) returns (EarningResponse) {
    option (google.api.http) = {
      post: "/v1/earning"
      body: "*"
    };
  }

  rpc GetEarning(StatusEarningRequest) returns (StatusEarningResponse) {
    option (google.api.http) = {
      get: "/v1/earning/{transaction_id}"
    };
  }

  rpc EarningPreview(EarningPreviewRequest) returns (EarningPreviewResponse) {
    option (google.api.http) = {
      post: "/v1/earning:preview"
      body: "*"
    };
  }

  rpc ValidateRedemption(RedeemValidationRequest) returns (RedeemValidationResponse) {
    option (google.api.http) = {
      post: "/v1/redemption:validate"
      body: "*"
    };
  }

  rpc Redemption(RedeemRequest) returns (RedeemResponse) {
    option (google.api.http) = {
      post: "/v1/redemption"
      body: "*"
    };
  }

  rpc GetRedemption(StatusRedeemRequest) returns (StatusRedeemResponse) {
    option (google.api.http) = {
      get: "/v1/redemption/{transaction_id}"
    };
  }
}

// ──────────────────────────────
//  Enums
// ──────────────────────────────

enum Status {
  STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUCCESS = 2;
  FAILED = 3;
}

enum RewardType {
  REWARD_TYPE_UNSPECIFIED = 0;
  VOUCHER = 1;
  PHYSICAL = 2;
  CASHBACK = 3;
  POINT = 4;
}

// ──────────────────────────────
//  Transaction attributes
// ──────────────────────────────

// Transaksi yang dikirim ke rule engine
message TransactionAttributes {
  string category = 1; // e.g., "transaction"
  smallbiznis.common.Money amount = 2;
  string order_id = 3;
  string reward_name = 4;
  string item_category = 5;
  string sub_category = 6;
  smallbiznis.transaction.v1.PaymentMethod payment_method = 7;
  smallbiznis.transaction.v1.ChannelType channel = 8;

  string brand_id = 9;
  string merchant_id = 10;
  string outlet_id = 11;
  string promo_id = 12;

  repeated smallbiznis.transaction.v1.TransactionItem items = 13;
  google.protobuf.Struct metadata = 14;
}

message TransactionItem {
  string sku = 1;
  string name = 2;
  string category = 3;
  int32 qty = 4;
  smallbiznis.common.Money price = 5;
  smallbiznis.common.Money total = 6;
}

// ──────────────────────────────
//  Earning API
// ──────────────────────────────

message AddPointsRequest {
  string tenant_id = 1;
  string user_id = 2;
  int64 points = 3;
  string reference_id = 4; // order_id / event_id
  string rule_id = 5;      // optional - rule yang memicu reward
  string campaign_id = 6;  // optional - campaign asal reward
  string reward_name = 7;  // human readable name, ex: "Welcome Bonus"
  string description = 8;  // free text description
  google.protobuf.Struct metadata = 9; // extra attributes
  int32 expire_days = 10;  // opsional, hari sebelum kadaluarsa
}

message AddPointsResponse {
  string ledger_entry_id = 1;
  int64 points = 2;
}

message EarningPreviewRequest {
  string user_id = 1;
  string tenant_id = 2;
  google.protobuf.Struct attributes = 3;
}

message EarningPreviewResponse {
  int64 estimated_point = 1;
  string rule_id = 2;
  string description = 3;
}

message EarningRequest {
  string user_id = 1;
  string tenant_id = 2;
  string reference_id = 3; // transaction.id atau order_id
  string ip_address = 4;
  string user_agent = 5;
  string event_type = 6;

  oneof attributes {
    TransactionAttributes transaction = 7;
  }
}

message EarningResponse {
  string transaction_id = 1;
  Status status = 2;
  google.protobuf.Timestamp created_at = 3;
}

message StatusEarningRequest {
  string transaction_id = 1;
}

message StatusEarningResponse {
  string transaction_id = 1;
  int64 earned_point = 2;
  Status status = 3;
  google.protobuf.Timestamp created_at = 4;
}

// ──────────────────────────────
//  Redemption API
// ──────────────────────────────

message RedeemValidationRequest {
  string tenant_id = 1;
  string user_id = 2;
  string reward_id = 3;
  google.protobuf.Struct attributes = 4;
}

message RedeemValidationResponse {
  bool is_valid = 1;
  string message = 2;
  int64 point_required = 3;
  smallbiznis.common.Money reward_value = 4;
}

message RedeemRequest {
  string tenant_id = 1;
  string user_id = 2;
  RewardType reward_type = 3;
  string reward_id = 4;
  string reference_id = 5;
  google.protobuf.Struct attributes = 6;
}

message RedeemResponse {
  string reference_id = 1;
  string transaction_id = 2;
  Status status = 3;
  google.protobuf.Timestamp redeemed_at = 4;
}

message StatusRedeemRequest {
  string transaction_id = 1;
}

message StatusRedeemResponse {
  string reference_id = 1;
  string transaction_id = 2;
  Status status = 3;
  string reward_id = 4;
  RewardType reward_type = 5;
  smallbiznis.common.Money reward_value = 6;
  int64 point_deducted = 7;
  google.protobuf.Timestamp redeemed_at = 8;
  google.protobuf.Struct data = 9;
}

message GetBalanceRequest {
  string member_id = 1;
  string tenant_id = 2;
}

message GetBalanceResponse {
  int64 balance = 1;
  google.protobuf.Timestamp last_updated_at = 2;
}

message GetExpiringPointsRequest {
  string tenant_id = 1;
  string member_id = 2;
  int32 within_days = 3; // contoh: 7, 30, default 7
}

message GetExpiringPointsResponse {
  int64 total_expiring_points = 1;
  repeated ExpiringPointBatch batches = 2;
}

message ExpiringPointBatch {
  string expire_date = 1; // "2025-12-31"
  int64 total_points = 2;
}

// Request untuk menjalankan proses expiry poin per tenant
message RunExpiryJobRequest {
  string tenant_id = 1;  // wajib: ID tenant
  google.protobuf.Timestamp run_at = 2; // optional: waktu eksekusi manual, default now
  bool dry_run = 3;  // kalau true → hanya simulasi (tanpa update ledger)
}

// Response hasil dari expiry job
message RunExpiryJobResponse {
  string job_id = 1;                // ID job untuk audit/log
  int64 total_expired_points = 2;   // total poin yang dihapus
  int64 total_members_affected = 3; // berapa member yang kena expiry
  string status = 4;                // success / failed / partial
  google.protobuf.Timestamp completed_at = 5;
  repeated ExpiredMember members = 6; // daftar member yang kena expiry (opsional)
}

// Data member yang poinnya expired
message ExpiredMember {
  string member_id = 1;
  int64 expired_points = 2;
}