syntax = "proto3";

package smallbiznis.orchestrator.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/orchestrator/v1;orchestratorv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// ========================================================
// ENUMS
// ========================================================

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  PURCHASE = 1; // transaction POS/Online
  SIGNUP = 2;      // new user
  REFERRAL = 3;    // referral completed
  BIRTHDAY = 4;    // birthday
  REVIEW = 5;      // review / rate
  CUSTOM = 6;      // custom
}

enum EarningStatus {
  EARNING_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUCCESS = 2;
  FAILED = 3;
}

// ========================================================
// ENTITIES
// ========================================================

// Event yang bisa menghasilkan reward (misal transaksi)
message EarningEvent {
  string event_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  EventType event_type = 4;
  string reference_id = 5;
  google.protobuf.Struct attributes = 6; // event-specific data
  EarningStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// Hasil evaluasi & eksekusi reward
message EarningResult {
  string campaign_id = 1;
  bool matched = 2;
  string reward_type = 3; // POINT / VOUCHER / FREE_ITEM
  google.protobuf.Struct reward_value = 4;
  string executor_service = 5; // loyalty / voucher / notification
  EarningStatus status = 6;
  string message = 7;
}

// ========================================================
// EVENT SCHEMA
// ========================================================

message TransactionAttribute {

  string category_id = 1;
  string sub_category_id = 2;

  string brand_id = 3;
  string merchant_id = 4;
  string outlet_id = 5;

  string promo_id = 6;

  string channel = 7;
  string payment_method = 8;

  int64 sub_total = 9;
  int64 discount_total = 10;
  int64 tax_total = 11;
  int64 shipping_fee = 12;
  int64 grand_total = 13;

  google.protobuf.Struct metadata = 14;
  google.protobuf.Timestamp transaction_at = 15;

  repeated TransactionItem items = 16;

}

message TransactionItem {

  string sku = 1;
  string name = 2;
  int64 qty = 3;
  int64 unit_price = 4;
  int64 total_price = 5;
  google.protobuf.Struct metadata = 6;

}


// ========================================================
// REQUESTS & RESPONSES
// ========================================================

// Input langsung dari event POS / referral / signup, dsb
message ProcessEarningRequest {
  string tenant_id = 1;
  string user_id = 2;
  EventType event_type = 3;
  string reference_id = 4;

  oneof attributes {

    TransactionAttribute transaction = 5;

  }

}

// Hasil evaluasi dari orchestrator
message ProcessEarningResponse {
  string trace_id = 1;
  repeated EarningResult results = 2;
  EarningStatus overall_status = 3;
}

// ========================================================
// SERVICE DEFINITION
// ========================================================

service OrchestratorService {
  // Entry point utama — dipanggil oleh POS/Referral service
  rpc ProcessEarning(ProcessEarningRequest) returns (ProcessEarningResponse) {
    option (google.api.http) = {
      post: "/v1/orchestrator/earnings:process"
      body: "*"
    };
  }
}
