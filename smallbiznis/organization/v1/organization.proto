syntax = "proto3";

package smallbiznis.organization.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/organization/v1;orgv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

import "protoc-gen-openapiv2/options/annotations.proto";

// OpenAPI (Swagger v2) top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/";
  consumes: "application/json";
  produces: "application/json";
};

service OrganizationService {

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Organization"
    description: "APIs for manage organization and sub organization (create, update, list, delete)"
  };

  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization) {
    option (google.api.http) = {
      post: "/v1/organizations"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization"
      operation_id: "Organization_Create"
      summary: "Create an organization"
      description: "Creates a new organization with the provided attributes. Returns the created organization on success."
      // Uncomment if you use JWT/Bearer
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  };

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = {
      get: "/v1/organizations/{id}"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization"
      operation_id: "Organization_Get"
      summary: "Get organization details"
      description: "Retrieves an organization by its unique identifier. Returns 404 if the organization does not exist."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc ListOrganization(ListOrganizationRequest) returns (ListOrganizationResponse) {
    option (google.api.http) = {
      get: "/v1/organizations"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization"
      operation_id: "Organization_List"
      summary: "List organizations"
      description: "Returns a paginated list of organizations. Use query parameters such as `cursor` and `limit` when available."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc UpdateOrganization(UpdateOrganizationRequest) returns (Organization) {
    option (google.api.http) = {
      put: "/v1/organizations/{id}",
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization"
      operation_id: "Organization_Update"
      summary: "Update an organization"
      description: "Updates mutable fields of an existing organization. Returns the updated resource on success."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

}

message Organization {
  string id = 1;
  string slug = 2;
  string name = 3;
  string logo_url = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message CreateOrganizationRequest {
  string name = 1;
  string logo_url = 2;
}

message ListOrganizationRequest {}

message ListOrganizationResponse {
  repeated Organization data = 1;
}

message GetOrganizationRequest {
  string id = 1;
}

message UpdateOrganizationRequest {
  string id = 1;
}