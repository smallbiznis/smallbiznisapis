syntax = "proto3";

package smallbiznis.organization.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/organization/v1;orgv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// ------------------ OpenAPI (Swagger v2) top-level config ------------------
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Multi-tenant, global-ready Organization & Onboarding APIs";
    contact: { name: "SmallBiznis project"; url: "https://github.com/smallbiznis"; email: "taufiktriantono4@gmail.com"; };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/";
  consumes: "application/json";
  produces: "application/json";
  // security_definitions: {
  //   security: [{
  //     key: "BearerAuth",
  //     value: { type: TYPE_API_KEY, in: IN_HEADER, name: "Authorization", description: "Bearer <token>" }
  //   }]
  // }
};

// ============================= SERVICE =====================================
service OrganizationService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Organization"
    description: "APIs to manage organizations, global regions, onboarding, locations, pricebooks, tax & payment profiles."
  };

  // -------- Core Org CRUD --------
  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization) {
    option (google.api.http) = { post: "/v1/organizations" body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Create an organization" operation_id: "Organization_Create"
      description: "Creates a new organization (tenant). Idempotent via Idempotency-Key header.";
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = { get: "/v1/organizations/{id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Get organization by id" operation_id: "Organization_Get";
    };
  }

  rpc ListOrganization(ListOrganizationRequest) returns (ListOrganizationResponse) {
    option (google.api.http) = { get: "/v1/organizations" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "List organizations (paginated)" operation_id: "Organization_List";
    };
  }

  rpc UpdateOrganization(UpdateOrganizationRequest) returns (Organization) {
    option (google.api.http) = { put: "/v1/organizations/{id}" body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Update an organization" operation_id: "Organization_Update";
    };
  }

  // -------- Onboarding Wizard --------
  rpc GetOnboardingState(GetOnboardingStateRequest) returns (GetOnboardingStateResponse) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}/onboarding" };
  }
  rpc StartOnboarding(StartOnboardingRequest) returns (GetOnboardingStateResponse) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/onboarding/start" body: "*" };
  }
  rpc CompleteOnboarding(CompleteOnboardingRequest) returns (GetOnboardingStateResponse) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/onboarding/complete" body: "*" };
  }

  // Step 1: Business Profile
  rpc PutBusinessProfile(PutBusinessProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/v1/organizations/{org_id}/business-profile" body: "*" };
  }

  // Step 2: Tax Config
  rpc PutTaxConfig(PutTaxConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/v1/organizations/{org_id}/tax-config" body: "*" };
  }

  // Step 3: Location & POS
  rpc CreateLocation(CreateLocationRequest) returns (Location) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/locations" body: "*" };
  }
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}/locations" };
  }
  rpc PutReceiptTemplate(PutReceiptTemplateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/v1/organizations/{org_id}/receipt-template" body: "*" };
  }

  // Step 4: Payments & Domain (optional)
  rpc ConnectPaymentProvider(ConnectPaymentProviderRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/payment-profiles" body: "*" };
  }
  rpc CreateDomain(CreateDomainRequest) returns (Domain) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/domains" body: "*" };
  }
  rpc VerifyDomainDNS(VerifyDomainDNSRequest) returns (Domain) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/domains/{domain_id}:verify-dns" body: "*" };
  }
  rpc ProvisionDomainTLS(ProvisionDomainTLSRequest) returns (Domain) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/domains/{domain_id}:provision-tls" body: "*" };
  }

  // -------- Globalization (Regions, Pricebooks, Tax Profiles) --------
  rpc CreateRegion(CreateRegionRequest) returns (OrgRegion) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/regions" body: "*" };
  }
  rpc ListRegions(ListRegionsRequest) returns (ListRegionsResponse) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}/regions" };
  }

  rpc CreatePricebook(CreatePricebookRequest) returns (Pricebook) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/pricebooks" body: "*" };
  }
  rpc UpsertPricebookItems(UpsertPricebookItemsRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/pricebooks/{pricebook_id}/items:upsert-batch" body: "*" };
  }
  rpc ListPricebooks(ListPricebooksRequest) returns (ListPricebooksResponse) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}/pricebooks" };
  }

  rpc CreateTaxProfile(CreateTaxProfileRequest) returns (TaxProfile) {
    option (google.api.http) = { post: "/v1/organizations/{org_id}/tax-profiles" body: "*" };
  }
  rpc ListTaxProfiles(ListTaxProfilesRequest) returns (ListTaxProfilesResponse) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}/tax-profiles" };
  }
}

// ============================= MESSAGES ====================================
message Organization {
  string id = 1;
  string slug = 2;
  string name = 3;
  string logo_url = 4;
  string status = 5; // trial, active, suspended
  string plan_id = 6; // free, pro, enterprise
  string billing_email = 7;
  google.protobuf.Timestamp trial_ends_at = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;          // for subdomain
  string logo_url = 3;
  string billing_email = 4; // invoice & owner contact
  string plan_id = 5;       // optional, default "free"
}

message GetOrganizationRequest { string id = 1; }

message UpdateOrganizationRequest {
  string id = 1;
  string name = 2;
  string slug = 3;
  string logo_url = 4;
  string status = 5;
  string plan_id = 6;
  string billing_email = 7;
}

message ListOrganizationRequest {
  int32 page_size = 1;      // default 20
  string page_token = 2;    // opaque token
  string query = 3;         // optional search by name/slug
}
message ListOrganizationResponse {
  repeated Organization data = 1;
  string next_page_token = 2;
}

// --------------------- Onboarding ---------------------
message WizardState {
  string current_step = 1; // business, tax, location, payment, complete
  repeated string steps_done = 2;
  bool completed = 3;
}
message GetOnboardingStateRequest { string org_id = 1; }
message GetOnboardingStateResponse { WizardState state = 1; }
message StartOnboardingRequest { string org_id = 1; }
message CompleteOnboardingRequest { string org_id = 1; bool accept_terms = 2; }

message BusinessProfile {
  string legal_name = 1;
  string tax_id = 2;       // NPWP/VAT id
  string address = 3;
  string phone = 4;
  string timezone = 5;     // Asia/Jakarta
  string currency = 6;     // IDR
  string locale = 7;       // id-ID
  string contact_email = 8;
}
message PutBusinessProfileRequest { string org_id = 1; BusinessProfile profile = 2; }

message TaxConfig {
  bool tax_inclusive = 1; // true for VAT/PPN style pricing
  double default_rate = 2; // e.g. 11.0 for ID PPN
}
message PutTaxConfigRequest { string org_id = 1; TaxConfig tax = 2; }

// --------------------- Locations ----------------------
message Location {
  string id = 1;
  string org_id = 2;
  string name = 3;
  string address = 4;
  string timezone = 5;
  bool is_default = 6;
  string country_code = 7; // ISO 3166-1 alpha-2
  string city = 8;
  string postal_code = 9;
  string locale = 10;
  string currency = 11;
  string region_id = 12; // link to OrgRegion
}
message CreateLocationRequest {
  string org_id = 1;
  string name = 2;
  string address = 3;
  string timezone = 4;
  bool is_default = 5;
  string country_code = 6;
  string city = 7;
  string postal_code = 8;
  string locale = 9;
  string currency = 10;
  string region_id = 11;
}
message ListLocationsRequest { string org_id = 1; }
message ListLocationsResponse { repeated Location data = 1; }

// --------------------- Receipt Template ----------------
message ReceiptTemplate {
  string header = 1; // multi-line allowed with \n
  string footer = 2;
  int32 width_mm = 3; // 58 or 80
  bool show_tax_breakdown = 4;
  string rounding_policy = 5; // nearest_1, nearest_100, etc.
}
message PutReceiptTemplateRequest { string org_id = 1; ReceiptTemplate tpl = 2; }

// --------------------- Domains ------------------------
message DomainDNSRecord { string type = 1; string host = 2; string value = 3; int32 ttl = 4; }
message Domain {
  string id = 1;
  string org_id = 2;
  string custom_domain = 3;
  string status = 4; // pending_dns, verified, tls_provisioned, failed
  repeated DomainDNSRecord dns_records = 5; // instructions for the user
}
message CreateDomainRequest { string org_id = 1; string custom_domain = 2; }
message VerifyDomainDNSRequest { string org_id = 1; string domain_id = 2; }
message ProvisionDomainTLSRequest { string org_id = 1; string domain_id = 2; }

// --------------------- Regions (Global) ----------------
message OrgRegion {
  string id = 1;
  string org_id = 2;
  string code = 3;            // EU, US, APAC
  string data_residency = 4;  // eu-west-1, us-east-1, asia-southeast1
  string default_currency = 5;
  string default_locale = 6;
  string tax_profile_id = 7;
  string payment_profile_id = 8;
}
message CreateRegionRequest {
  string org_id = 1;
  string code = 2;
  string data_residency = 3;
  string default_currency = 4;
  string default_locale = 5;
  string tax_profile_id = 6;
  string payment_profile_id = 7;
}
message ListRegionsRequest { string org_id = 1; }
message ListRegionsResponse { repeated OrgRegion data = 1; }

// --------------------- Pricebooks ---------------------
message Pricebook {
  string id = 1; string org_id = 2; string name = 3; string country_code = 4; string currency = 5; bool tax_inclusive = 6; bool active = 7;
}
message CreatePricebookRequest {
  string org_id = 1; string name = 2; string country_code = 3; string currency = 4; bool tax_inclusive = 5; bool active = 6;
}
message PricebookItemUpsert { string variant_id = 1; int64 price_minor = 2; int64 compare_at_minor = 3; string currency = 4; }
message UpsertPricebookItemsRequest { string org_id = 1; string pricebook_id = 2; repeated PricebookItemUpsert items = 3; }
message ListPricebooksRequest { string org_id = 1; string country_code = 2; string currency = 3; }
message ListPricebooksResponse { repeated Pricebook data = 1; }

// --------------------- Tax Profiles -------------------
message TaxProfile {
  string id = 1;
  string org_id = 2;
  string name = 3;     // "EU VAT OSS", "US Sales Tax", "ID PPN 11"
  string regime = 4;   // VAT, GST, SALES_TAX, PPN
  string country_code = 5; // optional
  string config_json = 6;  // JSON string for rules (rates, thresholds)
}

message CreateTaxProfileRequest {
  string org_id = 1; string name = 2; string regime = 3; string country_code = 4; string config_json = 5;
}

message ListTaxProfilesRequest { string org_id = 1; }
message ListTaxProfilesResponse { repeated TaxProfile data = 1; }

// --------------------- Payment Profiles ---------------
message PaymentRoute { string method = 1; string provider = 2; string account_id = 3; }
message PaymentProfile {
  string id = 1; string org_id = 2; string name = 3; repeated PaymentRoute routes = 4;
}
message ConnectPaymentProviderRequest {
  string org_id = 1; string name = 2; repeated PaymentRoute routes = 3; // e.g., method="qris", provider="xendit", account_id="..."
}
