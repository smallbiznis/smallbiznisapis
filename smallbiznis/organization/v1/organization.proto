syntax = "proto3";

package smallbiznis.organization.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/organization/v1;orgv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Multi-tenant, global-ready Organization & Onboarding APIs";
    contact: { name: "SmallBiznis project"; url: "https://github.com/smallbiznis"; email: "taufiktriantono4@gmail.com"; };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
  // security_definitions: {
  //   security: [{
  //     key: "BearerAuth",
  //     value: { type: TYPE_API_KEY, in: IN_HEADER, name: "Authorization", description: "Bearer <token>" }
  //   }]
  // }
};

service OrganizationService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Organization"
    description: "APIs to manage organizations, global regions, onboarding, locations, pricebooks, tax & payment profiles."
  };

  rpc ListCountries(ListCountriesRequest) returns (ListCountriesResponse) {
    option (google.api.http) = { get: "/v1/countries" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Countries" summary: "List countries" operation_id: "Countries_List";
      description: "List available countries."
    };
  }

  rpc GetCountry(GetCountryRequest) returns (Countries) {
    option (google.api.http) = { get: "/v1/countries/{code}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Countries" summary: "Get country by code" operation_id: "Countries_GetByCode";
      description: "Retrieve a country by its ISO code."
    };
  }

  rpc ListTimezone(ListTimezoneRequest) returns (ListTimezoneResponse) {
    option (google.api.http) = { get: "/v1/timezones" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Timezone" summary: "List an timezone" operation_id: "Timezone_List";
      description: "List a timezone."
    };
  }

  rpc GetTimezone(GetTimezoneRequest) returns (Timezones) {
    option (google.api.http) = { get: "/v1/timezones/{id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Timezone" summary: "Get an timezone by ID" operation_id: "Timezone_GetByID";
      description: "Get a timezone by id."
    };
  }

  rpc ListCurrency(ListCurrencyRequest) returns (ListCurrencyResponse) {
    option (google.api.http) = { get: "/v1/currencies" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Currencies" summary: "List an currency" operation_id: "Currency_List";
      description: "List a currency."
    };
  }

  // Organization
  rpc LookupOrganization(LookupOrganizationRequest) returns (LookupOrganizationResponse) {
    option (google.api.http) = { post: "/v1/organizations/lookup" body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Lookup an organization" operation_id: "Organization_Lookup";
      description: "Lookup a organization (tenant)."
    };
  }

  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization) {
    option (google.api.http) = { post: "/v1/organizations" body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Create an organization" operation_id: "Organization_Createe";
      description: "Creates a new organization (tenant). Idempotent via Idempotency-Key header.";
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = { get: "/v1/organizations/{org_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Get organization by id" operation_id: "Organization_Get";
    };
  }

  rpc ListOrganization(ListOrganizationRequest) returns (ListOrganizationResponse) {
    option (google.api.http) = { get: "/v1/organizations" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "List organizations (paginated)" operation_id: "Organization_List";
    };
  }

  rpc UpdateOrganization(UpdateOrganizationRequest) returns (Organization) {
    option (google.api.http) = { put: "/v1/organizations/{org_id}" body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Organization" summary: "Update an organization" operation_id: "Organization_Update";
    };
  }

  // Location
  rpc ListLocation(ListLocationRequest) returns (ListLocationResponse) {
     option (google.api.http) = { get: "/v1/locations" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Location" summary: "List locations (paginated)" operation_id: "Location_List";
    };
  }

  rpc CreateLocation(CreateLocationRequest) returns (Location) {
     option (google.api.http) = { post: "/v1/locations", body: "*" };
      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Location" summary: "List locations (paginated)" operation_id: "Location_List";
      };
  }

  rpc GetLocation(GetLocationRequest) returns (Location) {
    option (google.api.http) = { get: "/v1/locations/{location_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Location" summary: "Get location by id" operation_id: "Location_Get";
    };
  }

  // Invitation
  rpc CreateInvitation(CreateInvitationRequest) returns (CreateInvitationResponse) {
    option (google.api.http) = { post: "/v1/invitations", body: "*" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Invitation" summary: "List invitations (paginated)" operation_id: "Invitation_Create";
    };
  }

  rpc GetInvitation(GetInvitationRequest) returns (Invitation) {
    option (google.api.http) = { get: "/v1/invitations/{invitation_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Invitation" summary: "Get invitation by id" operation_id: "Invitation_Get";
    };
  }

  rpc RevokeInvitation(RevokeInvitationRequest) returns (RevokeInvitationResponse) {
    option (google.api.http) = { post: "/v1/invitations/{invitation_id}/revoke" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Invitation" summary: "Revoke invitation by id" operation_id: "Invitation_Revoke";
    };
  }

  rpc VerifyInvitation(VerifyInvitationRequest) returns (VerifyInvitationResponse) {
    option (google.api.http) = { post: "/v1/invitations/{token}/verify" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Invitation" summary: "Verify invitation by token" operation_id: "Invitation_Verify";
    };
  }

}

message Countries {
  string code = 1;
  string name = 2;
}

message GetCountryRequest {
  string code = 1;
}

message ListCountriesRequest {
  string code = 1;
  smallbiznis.common.CursorRequest page = 2;
}

message ListCountriesResponse {
  repeated Countries data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message Timezones {
  string id = 1;
  string country_code = 2;
  string tz = 3;
}

message ListTimezoneRequest {
  string country_code = 1;
  smallbiznis.common.CursorRequest page = 2;
}

message ListTimezoneResponse {
  repeated Timezones data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message GetTimezoneRequest {
  string id = 1;
}

message Currencies {
  string id = 1;
  string country_code = 2;
  string format = 3;
  string currency = 4;
}

message ListCurrencyRequest {
  string country_code = 1;
  smallbiznis.common.CursorRequest page = 2;
}

message ListCurrencyResponse {
  repeated Currencies data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

enum OrganizationType {
  TYPE_UNSPECIFIED = 0;
  PERSONAL = 1;
  COMPANY = 2;
}

enum PlanType {
  FREE = 0;
  PRO = 1;
  GROWTH = 2;
  ENTERPRISE = 3;
}

message Organization {
  string org_id = 1;
  OrganizationType type = 2;
  string slug = 3;
  string name = 4;
  string logo_url = 5;
  string country_code = 6;
  PlanType plan_id = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message LookupOrganizationRequest {
  string name = 1;
}

message LookupOrganizationResponse {
  string organization = 1;
}

message CreateOrganizationRequest {
  string name = 1;
  OrganizationType type = 2;
  string country_code = 3;
  string owner = 4;
  string plan_id = 5;
}

message GetOrganizationRequest { string org_id = 1; }

message UpdateOrganizationRequest {
  string org_id = 1;
  string name = 2;
  string slug = 3;
  string logo_url = 4;
}

message ListOrganizationRequest {
  smallbiznis.common.CursorRequest page = 1;
  string query = 2;         // optional search by name/slug
}

message ListOrganizationResponse {
  repeated Organization data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message Location {

  string location_id = 1;
  string org_id = 2;
  string name = 3;
  string address = 4;
  string city = 5;
  string zip_code = 6;
  string country_code = 7;
  string timezone = 8;
  bool is_default = 9;

  message GeoPoint {
    float lat = 1;
    float long = 2;
  }

  GeoPoint geo_point = 10;

}

message CreateLocationRequest {
  string org_id = 1;
  string name = 2;
  string address = 3;
  string city = 4;
  string zip_code = 5;
  string country_code = 6;
  string timezone = 7;
}

message ListLocationRequest {
  string org_id = 1;
  smallbiznis.common.CursorRequest page = 2;
}

message ListLocationResponse {
  repeated Location data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message GetLocationRequest {
  string location_id = 1;
}

enum Role {
  OWNER = 0;
}

enum InvitationStatus {
  INVITATION_PENDING = 0;
  INVITATION_ACCEPT = 1;
  INVITATION_EXPIRED = 2;
  INVITATION_REVOKED = 3;
}

message Invitation {
  string invitation_id = 1;
  string org_id = 2;
  string email = 3;
  string role = 4;
  string token = 5;
  InvitationStatus status = 6;
  string expiry_at = 7;
}

message CreateInvitationRequest {
  string org_id = 1;
  string email = 2;
  string role = 3;
}

message CreateInvitationResponse {}

message ListInvitationRequest {
  string org_id = 1;
}

message ListInvitationResponse {
  repeated Invitation data = 1;
}

message GetInvitationRequest {
  string invitation_id = 1;
}

message RevokeInvitationRequest {
  string invitation_id = 1;
}

message RevokeInvitationResponse {}

message VerifyInvitationRequest {
  string token = 1;
}

message VerifyInvitationResponse {}

message Member {
  string id = 1;
  string org_id = 2;
  string user_id = 3;
  string email = 4;
  Role role = 5;
}
