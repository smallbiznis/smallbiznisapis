syntax = "proto3";

package smallbiznis.play.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/play/v1;playv1";

import "smallbiznis/play/v1/play_resource.proto";
import "smallbiznis/common/pagination.proto";
import "google/api/annotations.proto";

message ListContentRequest {
  common.CursorRequest page = 1;
}

message ListContentResponse {
  common.CursorResponse page_info = 1;
  repeated Content data = 2;
}

message CreateContentRequest {
  string title = 1;
  string description = 2;
  ContentType type = 3;
}

message GetContentRequest {
  string id = 1;
}

message ListSeasonRequest {
  common.CursorRequest page = 1;
}

message ListSeasonResponse {
  common.CursorResponse page_info = 1;
  repeated Season data = 2;
}

message GetSeasonRequest {
  string id = 1;
}

message CreateSeasonRequest {
  string content_id = 1;
}

message ListEpisodeRequest {
  common.CursorRequest page = 1;
}

message ListEpisodeResponse {
  common.CursorResponse page_info = 1;
  repeated Episode data = 2;
}

message GetEpisodeRequest {
  string id = 1;
}

message CreateEpisodeRequest {
  string season_id = 1;
}

service Service {
  
  rpc ListContent(ListContentRequest) returns (ListContentResponse) {
    option (google.api.http) = {
      get: "/v1/contents"
    };
  };

  rpc CreateContent(CreateContentRequest) returns (Content) {
    option (google.api.http) = {
      post: "/v1/contents"
      body: "*"
    };
  };

  rpc GetContent(GetContentRequest) returns (Content) {
    option (google.api.http) = {
      get: "/v1/contents/{id}"
    };
  };

  rpc ListSeason(ListSeasonRequest) returns (ListSeasonResponse) {
    option (google.api.http) = {
      get: "/v1/seasons"
    };
  };

  rpc GetSeason(GetSeasonRequest) returns (Season) {
    option (google.api.http) = {
      get: "/v1/seasons/{id}"
    };
  }

  rpc CreateSeason(CreateSeasonRequest) returns (Season) {
    option (google.api.http) = {
      post: "/v1/seasons"
      body: "*"
    };
  }

  rpc ListEpisode(ListEpisodeRequest) returns (ListEpisodeResponse) {
    option (google.api.http) = {
      get: "/v1/episodes"
    };
  }

  rpc GetEpisode(GetEpisodeRequest) returns (Episode) {
    option (google.api.http) = {
      get: "/v1/episodes/{id}"
    };
  };

  rpc CreateEpisode(CreateEpisodeRequest) returns (GetEpisodeRequest) {
    option (google.api.http) = {
      post: "/v1/episodes"
      body: "*"
    };
  }

}