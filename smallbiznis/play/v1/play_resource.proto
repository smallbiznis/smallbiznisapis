syntax = "proto3";

package smallbiznis.play.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/play/v1;playv1";

import "google/protobuf/timestamp.proto";

enum VideoStatus {
  VIDEO_TYPE_PENDING = 0;

  VIDEO_TYPE_PROCESSING = 1;

  VIDEO_TYPE_READY = 2;

  VIDEO_TYPE_FAILED = 3;
}

enum VideoResolution {
  VIDEO_RESOLUTION_ORIGINAL = 0;

  VIDEO_RESOLUTION_1080 = 1;

  VIDEO_RESOLUTION_720 = 2;

  VIDEO_RESOLUTION_480 = 3;

  VIDEO_RESOLUTION_360 = 4;

  VIDEO_RESOLUTION_240 = 5;
}

message Video {
  string id = 1;
  string content_id = 2;
  string episode_id = 3;
  VideoResolution resolution = 4;
  string video_url = 5;
  float duration = 6;
  int64 filesize = 7;
  bool is_ready = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Genre {
  string id = 1;
  string name = 2;
}

message Tag {
  string id = 1;
  string label = 2;
}

enum ContentType {
  CONTENT_TYPE_MOVIE = 0;

  CONTENT_TYPE_SERIES = 1;
}

enum ContentStatus {
  CONTENT_STATUS_DRAFT = 0;

  CONTENT_STATUS_PROCESSING = 1;

  CONTENT_STATUS_READY = 2;

  CONTENT_STATUS_FAILED = 3;
}

message Content {
  string id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  ContentType type = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Season {
  string id = 1;
  string content_id = 2;
  string title = 3;
  string description = 4; 
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Episode {
  string id = 1;
  string content_id = 2;
  string season_id = 3;
  string title = 4;
  string description = 5;
  int64 number = 6;
  string release_date = 7;
  repeated Subtitle subtitles = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Thumbnail {
  string id = 1;
  string content_id = 2;
  string episode_id = 3;
  string sprite_url = 4;
  string vtt_url = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Subtitle {
  string id = 1;
  string content_id = 2;
  string episode_id = 3;
  string language = 4;
  string label = 5;
  string file_url = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}