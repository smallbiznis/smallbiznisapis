syntax = "proto3";

package smallbiznis.product.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/product/v1;productv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/api/annotations.proto";
import "google/type/money.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

// ----------------------------
// ENUMS
// ----------------------------
enum ProductType {
  PRODUCT_TYPE_UNSPECIFIED = 0;
  PHYSICAL = 1;
  DIGITAL = 2;
  MENU = 3;
}

enum ProductStatus {
  STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  DRAFT = 2;
  ARCHIVED = 3;
}

enum WeightUnit {
  UNIT_UNSPECIFIED = 0;
  KG = 1;
  G = 2;
}

// ----------------------------
// MODELS
// ----------------------------
message Option {
  string option_id = 1;
  string org_id = 2;
  string option_name = 3;
  repeated OptionValue values = 4;
}

message OptionValue {
  string option_id = 1;
  string value = 2;
  google.type.Money additional_price = 3;
}

message ProductResources {
  string resources_id = 1;
}

message Product {
  string product_id = 1;
  string org_id = 2;
  ProductType type = 3;
  string slug = 4;
  string title = 5;
  string body_html = 6;
  ProductStatus status = 7;

  

  repeated ProductOption options = 8;
  repeated Variant variants = 9;

  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ProductOption {

  string option_name = 1;

  repeated ProductOptionValue values = 2;

  int32 position = 3;

}

message ProductOptionValue {

  string value = 1;
  
  google.type.Money additional_price = 2;

}

message Variant {
  string variant_id = 1;
  string product_id = 2;
  string org_id = 3;
  string sku = 4;
  string title = 5;
  bool taxable = 6;
  repeated Price prices = 7;
  Dimension dimension = 8;
  repeated Attribute attributes = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Attribute {
  string key = 1;
  string value = 2;
}

message Price {
  string price_id = 1;
  string variant_id = 2;
  google.type.Money price = 3;
  google.type.Money cost = 4;
  google.type.Money compare_at_price = 5;
}

message Dimension {
  string dimension_id = 1;
  string variant_id = 2;
  double weight = 3;
  string weight_unit = 4;
  double height = 5;
  string height_unit = 6;
  double depth = 7;
}

// ----------------------------
// REQUESTS & RESPONSES
// ----------------------------
message ListProductsRequest {
  string org_id = 1;
  smallbiznis.common.v1.CursorRequest page = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  smallbiznis.common.v1.CursorResponse page = 2;
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message CreateProductRequest {
  Product product = 1;
}

message UpdateProductRequest {
  Product product = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message DeleteProductRequest {
  string product_id = 1;
  string org_id = 2;
}

// Option
message ListOptionsRequest {
  string org_id = 1;
  smallbiznis.common.v1.CursorRequest page = 2;
}

message ListOptionsResponse {
  repeated Option data = 1;
  smallbiznis.common.v1.CursorResponse page = 2;
}

message GetOptionRequest {
  string option_id = 1;
}

message CreateOptionRequest {
  Option option = 1;
}

message UpdateOptionRequest {
  Option option = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message DeleteOptionRequest {
  string option_id = 1;
  string org_id = 2;
}

// Variant
message ListVariantsRequest {
  string product_id = 1;
  smallbiznis.common.v1.CursorRequest page = 2;
}

message ListVariantsResponse {
  repeated Variant data = 1;
  smallbiznis.common.v1.CursorResponse page = 2;
}

message GetVariantRequest {
  string variant_id = 1;
  string product_id = 2;
}

message CreateVariantRequest {
  string product_id = 1;
  Variant variant = 2;
}

message UpdateVariantRequest {
  Variant variant = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message DeleteVariantRequest {
  string variant_id = 1;
  string product_id = 2;
}

// ----------------------------
// SERVICE
// ----------------------------

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Multi-tenant, global-ready Organization & Onboarding APIs";
    contact: { name: "SmallBiznis project"; url: "https://github.com/smallbiznis"; email: "taufiktriantono4@gmail.com"; };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
  // security_definitions: {
  //   security: [{
  //     key: "BearerAuth",
  //     value: { type: TYPE_API_KEY, in: IN_HEADER, name: "Authorization", description: "Bearer <token>" }
  //   }]
  // }
};

service ProductService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Products"
    description: "APIs to manage products, options, and variants."
  };

  // Products
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = { get: "/v1/products" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Products"
      summary: "List all products"
      operation_id: "Product_List"
      description: "Retrieve a paginated list of products for an organization."
    };
  }

  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = { get: "/v1/products/{product_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Products"
      summary: "Get product by ID"
      operation_id: "Product_GetByID"
      description: "Retrieve a product by its unique identifier."
    };
  }

  rpc CreateProduct(CreateProductRequest) returns (Product) {
    option (google.api.http) = { post: "/v1/products" body: "product" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Products"
      summary: "Create a product"
      operation_id: "Product_Create"
      description: "Create a new product for an organization."
    };
  }

  rpc UpdateProduct(UpdateProductRequest) returns (Product) {
    option (google.api.http) = { put: "/v1/products/{product.product_id}" body: "product" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Products"
      summary: "Update product"
      operation_id: "Product_Update"
      description: "Update an existing product by ID."
    };
  }

  rpc DeleteProduct(DeleteProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/products/{product_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Products"
      summary: "Delete product"
      operation_id: "Product_Delete"
      description: "Delete a product by its unique identifier."
    };
  }

  // Options
  rpc ListOptions(ListOptionsRequest) returns (ListOptionsResponse) {
    option (google.api.http) = { get: "/v1/options" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Options"
      summary: "List options"
      operation_id: "Option_List"
      description: "Retrieve a paginated list of product options."
    };
  }

  rpc GetOption(GetOptionRequest) returns (Option) {
    option (google.api.http) = { get: "/v1/options/{option_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Options"
      summary: "Get option by ID"
      operation_id: "Option_GetByID"
      description: "Retrieve a product option by its unique identifier."
    };
  }

  rpc CreateOption(CreateOptionRequest) returns (Option) {
    option (google.api.http) = { post: "/v1/options" body: "option" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Options"
      summary: "Create option"
      operation_id: "Option_Create"
      description: "Create a new product option."
    };
  }

  rpc UpdateOption(UpdateOptionRequest) returns (Option) {
    option (google.api.http) = { put: "/v1/options/{option.option_id}" body: "option" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Options"
      summary: "Update option"
      operation_id: "Option_Update"
      description: "Update an existing product option by ID."
    };
  }

  rpc DeleteOption(DeleteOptionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/options/{option_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Options"
      summary: "Delete option"
      operation_id: "Option_Delete"
      description: "Delete a product option by ID."
    };
  }

  // Variants
  rpc ListVariants(ListVariantsRequest) returns (ListVariantsResponse) {
    option (google.api.http) = { get: "/v1/products/{product_id}/variants" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Variants"
      summary: "List variants"
      operation_id: "Variant_List"
      description: "Retrieve all variants of a given product."
    };
  }

  rpc GetVariant(GetVariantRequest) returns (Variant) {
    option (google.api.http) = { get: "/v1/products/{product_id}/variants/{variant_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Variants"
      summary: "Get variant by ID"
      operation_id: "Variant_GetByID"
      description: "Retrieve a product variant by its unique identifier."
    };
  }

  rpc CreateVariant(CreateVariantRequest) returns (Variant) {
    option (google.api.http) = { post: "/v1/products/{product_id}/variants" body: "variant" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Variants"
      summary: "Create variant"
      operation_id: "Variant_Create"
      description: "Create a new variant for a given product."
    };
  }

  rpc UpdateVariant(UpdateVariantRequest) returns (Variant) {
    option (google.api.http) = { put: "/v1/products/{variant.product_id}/variants/{variant.variant_id}" body: "variant" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Variants"
      summary: "Update variant"
      operation_id: "Variant_Update"
      description: "Update an existing product variant by ID."
    };
  }

  rpc DeleteVariant(DeleteVariantRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/products/{product_id}/variants/{variant_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Variants"
      summary: "Delete variant"
      operation_id: "Variant_Delete"
      description: "Delete a product variant by ID."
    };
  }
}
