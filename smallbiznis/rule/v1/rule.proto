syntax = "proto3";

package smallbiznis.rule.v2;
option go_package = "github.com/smallbiznis/smallbiznisapis/smallbiznis/rule/v2;rulev2";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// ===================
// ENUMS
// ===================
enum ConditionOperator {
  CONDITION_OPERATOR_UNSPECIFIED = 0;
  AND = 1;
  OR = 2;
  EQUALS = 3;
  NOT_EQUALS = 4;
  GREATER_THAN = 5;
  GREATER_OR_EQUAL = 6;
  LESS_THAN = 7;
  LESS_OR_EQUAL = 8;
  IN = 9;
  NOT_IN = 10;
}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  ROOT = 1;
  GROUP = 2;
  CONDITION = 3;
}

enum RuleSetStatus {
  RULESET_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  ACTIVE = 2;
  DISABLED = 3;
  ARCHIVED = 4;
}

// ===================
// ENTITIES
// ===================
message RuleSet {
  string rule_set_id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  string trigger_type = 5;
  bool is_active = 6;
  RuleSetStatus status = 7;
  int32 priority = 8;
  google.protobuf.Struct ui_schema = 9; // visual builder layout
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message RuleCondition {
  string condition_id = 1;
  string rule_set_id = 2;
  NodeType node_type = 3;
  ConditionOperator operator = 4;
  string left_operand = 5;
  string right_operand = 6;
  string value_type = 7;
  google.protobuf.Struct metadata = 8;
  int32 order_index = 9;
}

message RuleAction {
  string action_id = 1;
  string rule_set_id = 2;
  string action_type = 3;
  google.protobuf.Struct parameters = 4;
  int32 order_index = 5;
}

message RuleHistory {
  string history_id = 1;
  string rule_set_id = 2;
  google.protobuf.Struct context = 3;
  bool matched = 4;
  repeated string executed_action_ids = 5;
  google.protobuf.Timestamp executed_at = 6;
}

// ===================
// REQUESTS / RESPONSES
// ===================

message CreateRuleSetRequest {
  string tenant_id = 1;
  string name = 2;
  string description = 3;
  string trigger_type = 4;
  bool is_active = 5;
  google.protobuf.Struct ui_schema = 6;
}

message UpdateRuleSetRequest {
  string rule_set_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  RuleSetStatus status = 5;
  google.protobuf.Struct ui_schema = 6;
}

message ListRuleSetsRequest {
  string tenant_id = 1;
  string trigger_type = 2;
  int32 limit = 3;
  string cursor = 4;
}

message ListRuleSetsResponse {
  repeated RuleSet rule_sets = 1;
  string next_cursor = 2;
}

message GetRuleSetRequest {
  string rule_set_id = 1;
}

message DeleteRuleSetRequest {
  string rule_set_id = 1;
}

message DeleteRuleSetResponse {
  bool success = 1;
}

message EvaluateRuleSetRequest {
  string tenant_id = 1;
  string rule_set_id = 2;
  google.protobuf.Struct context = 3;
}

message EvaluateRuleSetResponse {
  bool matched = 1;
  repeated RuleAction executed_actions = 2;
  string evaluation_trace = 3;
}

message TestRuleSetRequest {
  string tenant_id = 1;
  google.protobuf.Struct context = 2;
  google.protobuf.Struct ui_schema = 3; // test without saving
}

message TestRuleSetResponse {
  bool matched = 1;
  string trace_log = 2;
}

message ListRuleHistoriesRequest {
  string tenant_id = 1;
  string rule_set_id = 2;
  int32 limit = 3;
  string cursor = 4;
}

message ListRuleHistoriesResponse {
  repeated RuleHistory histories = 1;
  string next_cursor = 2;
}

// ===================
// SERVICE
// ===================
service RuleSetService {

  rpc CreateRuleSet(CreateRuleSetRequest) returns (RuleSet);
  rpc UpdateRuleSet(UpdateRuleSetRequest) returns (RuleSet);
  rpc GetRuleSet(GetRuleSetRequest) returns (RuleSet);
  rpc ListRuleSets(ListRuleSetsRequest) returns (ListRuleSetsResponse);
  rpc DeleteRuleSet(DeleteRuleSetRequest) returns (DeleteRuleSetResponse);

  // Evaluation
  rpc EvaluateRuleSet(EvaluateRuleSetRequest) returns (EvaluateRuleSetResponse);
  rpc TestRuleSet(TestRuleSetRequest) returns (TestRuleSetResponse);

  // History / audit
  rpc ListRuleHistories(ListRuleHistoriesRequest) returns (ListRuleHistoriesResponse);
}
