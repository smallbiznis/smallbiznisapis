syntax = "proto3";

package smallbiznis.rule.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/rule/v1;rulev1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Rule Engine APIs for loyalty, voucher, cashback, and campaign orchestration.";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

service RuleService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Rule";
    description: "APIs to manage dynamic rule configurations for loyalty, voucher, cashback, and campaign workflows.";
  };

  rpc CreateRule(CreateRuleRequest) returns (Rule) {
    option (google.api.http) = {
      post: "/v1/rules"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a rule";
      description: "Creates a new rule for the organization. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_Create";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc GetRule(GetRuleRequest) returns (Rule) {
    option (google.api.http) = { get: "/v1/rules/{rule_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get a rule";
      description: "Retrieves a rule by ID within the organization. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_Get";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc ListRules(ListRulesRequest) returns (ListRulesResponse) {
    option (google.api.http) = { get: "/v1/rules" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List rules";
      description: "Lists rules for the organization with pagination support. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_List";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc UpdateRule(UpdateRuleRequest) returns (Rule) {
    option (google.api.http) = {
      put: "/v1/rules/{rule_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update a rule";
      description: "Updates an existing rule definition. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_Update";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse) {
    option (google.api.http) = { delete: "/v1/rules/{rule_id}" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete a rule";
      description: "Deletes a rule from the organization. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_Delete";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }

  rpc EvaluateRules(EvaluateRuleRequest) returns (EvaluateRuleResponse) {
    option (google.api.http) = {
      post: "/v1/rules:evaluate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Evaluate rules";
      description: "Evaluates rules for a given trigger and context. `X-Organization-ID` header is mandatory.";
      operation_id: "Rule_Evaluate";
      parameters: {
        headers: {
          name: "X-Organization-ID";
          description: "Organization context identifier";
          type: STRING;
          required: true;
        };
      };
    };
  }
}

enum RuleTriggerType {
  RULE_TRIGGER_TYPE_UNSPECIFIED = 0;
  RULE_TRIGGER_TYPE_ORDER_CREATED = 1;
  RULE_TRIGGER_TYPE_ORDER_PAID = 2;
  RULE_TRIGGER_TYPE_CUSTOMER_SIGNUP = 3;
  RULE_TRIGGER_TYPE_MANUAL = 4;
}

enum RuleActionType {
  RULE_ACTION_TYPE_UNSPECIFIED = 0;
  RULE_ACTION_TYPE_EARN_POINT = 1;
  RULE_ACTION_TYPE_REDEEM_POINT = 2;
  RULE_ACTION_TYPE_ISSUE_VOUCHER = 3;
  RULE_ACTION_TYPE_CASHBACK = 4;
  RULE_ACTION_TYPE_NOTIFY = 5;
  RULE_ACTION_TYPE_TAG_CUSTOMER = 6;
}

message Rule {
  string rule_id = 1;
  string org_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
  int32 priority = 6;
  RuleTriggerType trigger = 7;
  string dsl_expression = 8;
  repeated RuleAction actions = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message RuleAction {
  RuleActionType type = 1;
  oneof payload {
    PointAction point_action = 2;
    VoucherAction voucher_action = 3;
    CashbackAction cashback_action = 4;
    NotifyAction notify_action = 5;
    TagAction tag_action = 6;
  }
}

message PointAction {
  int32 points = 1;
  string reference = 2;
  map<string, string> metadata = 3;
}

message VoucherAction {
  string voucher_code = 1;
  double discount_value = 2;
  string discount_type = 3;
  google.protobuf.Timestamp expiry_date = 4;
  map<string, string> metadata = 5;
}

message CashbackAction {
  double amount = 1;
  string currency = 2;
  string target_wallet_id = 3;
  map<string, string> metadata = 4;
}

message NotifyAction {
  string channel = 1;
  string template_id = 2;
  map<string, string> metadata = 3;
}

message TagAction {
  string tag_key = 1;
  string tag_value = 2;
}

message CreateRuleRequest {
  string name = 1;
  string description = 2;
  bool is_active = 3;
  int32 priority = 4;
  RuleTriggerType trigger = 5;
  string dsl_expression = 6;
  repeated RuleAction actions = 7;
}

message GetRuleRequest {
  string rule_id = 1;
}

message ListRulesRequest {
  smallbiznis.common.CursorRequest paging = 1;
  bool include_inactive = 2;
  repeated RuleTriggerType triggers = 3;
}

message ListRulesResponse {
  repeated Rule rules = 1;
  smallbiznis.common.CursorResponse paging = 2;
}

message UpdateRuleRequest {
  string rule_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  int32 priority = 5;
  RuleTriggerType trigger = 6;
  string dsl_expression = 7;
  repeated RuleAction actions = 8;
}

message DeleteRuleRequest {
  string rule_id = 1;
}

message DeleteRuleResponse {}

message EvaluateRuleRequest {
  string trigger = 1;
  map<string, string> attributes = 2;
}

message EvaluateRuleResponse {
  repeated Rule matched_rules = 1;
  repeated RuleAction actions = 2;
  int32 total_points = 3;
  double total_discount = 4;
  repeated string generated_vouchers = 5;
  map<string, string> metadata = 6;
}
