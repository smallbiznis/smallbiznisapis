syntax = "proto3";

package smallbiznis.subscription.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/subscription/v1;subscription";

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message Session {
  string id = 1;
  string client_secret = 2;
  string currency = 3;
}

message Customer {

  string id = 1;

  string name = 2;

  string email = 3;

}

message Address {
  string city = 1;
  string country = 2;
  string line1 = 3;
  string line2 = 4;
  string postal_code = 5;
  string state = 6;
}

message BillingDetail {

  Address address = 1;

  string email = 2;

  string name = 3;

  string phone = 4;

}

message CardDetail {

  string number = 1;

  int32 exp_month = 2;

  int32 exp_year = 3;

  string cvv = 4;

}

message PaymentMethod {
  string customer_id = 1;
  BillingDetail billing_detail = 2;
  CardDetail card = 3;
  string token = 4;
}

message Product {

  string id = 1;

  repeated string images = 2;

  string name = 3;

  string description = 4;

  bool active = 5;

  google.protobuf.Timestamp created_at = 6;

  google.protobuf.Timestamp updated_at = 7;

}

enum PlanInterval {

  day = 0;

  week = 1;

  month = 2;

  year = 3;

}

message Plan {

  string id = 1;

  Product product = 2;

  string interval = 3;

  int32 interval_count = 4;

  float amount = 5;

  google.protobuf.Timestamp created_at = 6;

}

message Subscription {

  string id = 1;

  string customer_id = 2;

  string plan_id = 3;

  google.protobuf.Timestamp start_date = 4;

  google.protobuf.Timestamp end_date = 5;

  string status = 6;

  google.protobuf.Timestamp created_at = 7;

}