syntax = "proto3";

package smallbiznis.transaction.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/transaction/v1;transactionv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/annotations.proto";

// Internal Common
import "smallbiznis/common/money.proto";

// ========================================================
// ENUMS
// ========================================================

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUCCESS = 2;
  FAILED = 3;
  CANCELLED = 4;
  REFUNDED = 5;
}

enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  CASH = 1;
  CARD = 2;
  QRIS = 3;
  TRANSFER = 4; // Virtual Account
  WALLET = 5; // E-Money
}

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  ONLINE = 1;
  POS = 2;
  API = 3;
}

// ========================================================
// MESSAGES
// ========================================================

message TransactionItem {
  string item_id = 1;
  string sku = 2;
  string name = 3;
  string category = 4;
  int32 qty = 5;
  smallbiznis.common.Money price = 6;
  smallbiznis.common.Money total = 7;
  google.protobuf.Struct metadata = 8;
}

message Transaction {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string order_id = 4;

  smallbiznis.common.Money amount = 5;
  TransactionStatus status = 6;
  PaymentMethod payment_method = 7;
  ChannelType channel = 8;
  google.protobuf.Struct metadata = 9;

  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  repeated TransactionItem items = 12;
}

// ========================================================
// REQUESTS / RESPONSES
// ========================================================

message CreateTransactionItemRequest {
  string sku = 1;
  string name = 2;
  string category = 3;
  int32 qty = 4;
  smallbiznis.common.Money price = 5;
  smallbiznis.common.Money total = 6;
  google.protobuf.Struct metadaa = 7;
}

message CreateTransactionRequest {
  string tenant_id = 1;
  string user_id = 2;
  string order_id = 3;
  smallbiznis.common.Money amount = 4;
  PaymentMethod payment_method = 5;
  google.protobuf.Struct metadata = 6;
  repeated CreateTransactionItemRequest items = 7;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message GetTransactionRequest {
  string tenant_id = 1;
  string transaction_id = 2;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

message ListTransactionsRequest {
  string tenant_id = 1;
  int32 limit = 2;
  string cursor = 3;
  TransactionStatus filter_status = 4;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_cursor = 2;
}

message UpdateTransactionStatusRequest {
  string tenant_id = 1;
  string transaction_id = 2;
  TransactionStatus status = 3;
}

message UpdateTransactionStatusResponse {
  Transaction transaction = 1;
}

// ========================================================
// SERVICE DEFINITION
// ========================================================

service TransactionService {
  // Create a new transaction
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse) {
    option (google.api.http) = {
      post: "/v1/transactions"
      body: "*"
    };
  }

  // Get a single transaction
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse) {
    option (google.api.http) = {
      get: "/v1/transactions/{transaction_id}"
    };
  }

  // List transactions (paginated)
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = {
      get: "/v1/transactions"
    };
  }

  // Update status (used for marking success/failed/refunded)
  rpc UpdateTransactionStatus(UpdateTransactionStatusRequest) returns (UpdateTransactionStatusResponse) {
    option (google.api.http) = {
      patch: "/v1/transactions/{transaction_id}/status"
      body: "*"
    };
  }
}

// ========================================================
// EVENT SCHEMA
// ========================================================

// Emitted to message broker (Kafka/NATS/Asynq) when transaction completes or updates.
message TransactionEvent {
  string tenant_id = 1;
  string transaction_id = 2;
  string user_id = 3;
  smallbiznis.common.Money amount = 4;
  ChannelType channel = 5;
  TransactionStatus status = 6;
  google.protobuf.Struct metadata = 7;
  google.protobuf.Timestamp created_at = 8;
}
