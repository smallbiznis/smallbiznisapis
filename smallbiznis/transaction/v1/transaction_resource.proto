syntax = "proto3";

package smallbiznis.transaction.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/transaction/v1;transaction";

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message Order {

  string order_id = 1;

  string organization_id = 2;

  string customer_id = 3;

  string shipping_address_id = 4;

  string order_no = 5;

  float total_amount = 6;

  enum Status {

    pending = 0;

    processing = 1;

    shipped = 2;

    completed = 3;

    refunded = 4;

    canceled = 5;

  }

  Status status = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

  repeated OrderItem order_items = 10;

}

message OrderItem {

  string order_item_id = 1;

  string order_id = 2;

  string variant_id = 3;

  int32 quantity = 4;

  float price = 5;

  float total_price = 6;

  google.protobuf.Timestamp created_at = 7;

  google.protobuf.Timestamp updated_at = 8;

}