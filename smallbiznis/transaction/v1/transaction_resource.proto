syntax = "proto3";

package smallbiznis.transaction.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/transaction/v1;transaction";

import "google/type/date.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

enum OrderStatus {

  draft = 0;

  created = 1;

  confirmed = 2;

  cancelled = 3;

  completed = 4;

}

enum FulfillmentStatus {

  not_fulfilled = 0;

  partial_fulfilled = 1;

  fulfilled = 2;

  failed = 3;

}

message Order {

  string order_id = 1;

  string organization_id = 2;

  string customer_id = 3;

  string sales_channel_id = 4;

  string billing_address_id = 5;

  string shipping_payment_id = 6;

  string order_no = 7;

  float sub_total = 8;

  float tax_amount = 9;

  float total_amount = 10;

  OrderStatus status = 11;

  google.protobuf.Timestamp created_at = 12;

  google.protobuf.Timestamp updated_at = 13;

  repeated OrderItem order_items = 14;

}

message OrderItem {

  string order_item_id = 1;

  string order_id = 2;

  string item_id = 3;

  string item_name = 4;

  int32 quantity = 5;

  float unit_price = 6;

  float tax_amount = 7;

  float total_price = 8;

  google.protobuf.Timestamp created_at = 9;

  google.protobuf.Timestamp updated_at = 10;

}