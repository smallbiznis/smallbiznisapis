syntax = "proto3";

package smallbiznis.transaction.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/transaction/v1;transaction";

import "smallbiznis/customer/v1/customer_resource.proto";

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message Order {

  string order_id = 1;

  string organization_id = 2;

  smallbiznis.customer.v1.Customer customer = 3;

  smallbiznis.customer.v1.Address address = 4;

  string order_no = 5;

  float total_amount = 6;

  float tax_amount = 7;

  float grand_total = 8;

  enum Status {

    pending = 0;

    processing = 1;

    shipped = 2;

    completed = 3;

    refunded = 4;

    canceled = 5;

  }

  Status status = 9;

  google.protobuf.Timestamp created_at = 10;

  google.protobuf.Timestamp updated_at = 11;

  repeated OrderItem order_items = 12;

}

message OrderItem {

  string order_item_id = 1;

  string order_id = 2;

  string variant_id = 3;

  int32 quantity = 4;

  float unit_price = 5;

  float total_price = 6;

  google.protobuf.Timestamp created_at = 7;

  google.protobuf.Timestamp updated_at = 8;

}