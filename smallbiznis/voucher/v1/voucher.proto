syntax = "proto3";

package smallbiznis.voucher.v1;

option go_package = "github.com/smallbiznis/smallbiznisapis/smallbiznis/voucher/v1;voucherv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

// ========================================================
// ENUMS
// ========================================================

enum CampaignType {
  CAMPAIGN_TYPE_UNSPECIFIED = 0;
  CAMPAIGN_DISCOUNT = 1;
  CAMPAIGN_CASHBACK = 2;
  CAMPAIGN_FREE_ITEM = 3;
}

enum DiscountType {
  DISCOUNT_TYPE_UNSPECIFIED = 0;
  FIXED = 1;
  PERCENT = 2;
  FREE_ITEM = 3;
  CUSTOM = 4;
}

enum IssuanceStatus {
  ISSUANCE_STATUS_UNSPECIFIED = 0;
  ISSUED = 1;
  REDEEMED = 2;
  EXPIRED = 3;
  CANCELED = 4;
}

// ========================================================
// ENTITIES
// ========================================================

// Voucher represents a redeemable entity (linked to a campaign).
message Voucher {
  string voucher_id = 1;
  string tenant_id = 2;
  string campaign_id = 3;
  string code = 4;
  string name = 5;
  DiscountType discount_type = 6;
  double discount_value = 7;
  string currency = 8;
  int32 stock = 9;
  int32 remaining_stock = 10;
  google.protobuf.Timestamp expiry_date = 11;
  bool is_active = 12;
  google.protobuf.Struct metadata = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// VoucherCampaign represents logical grouping of vouchers.
message VoucherCampaign {
  string campaign_id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  CampaignType type = 5; // discount, cashback, etc.
  string code = 6;
  int32 total_stock = 7;
  int32 remaining_stock = 8;
  bool is_active = 9;
  google.protobuf.Timestamp start_at = 10;
  google.protobuf.Timestamp end_at = 11;
  string dsl_expression = 12; // CEL expression for eligibility
  google.protobuf.Struct metadata = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// VoucherIssuance represents voucher assigned to a user.
message VoucherIssuance {
  string issuance_id = 1;
  string tenant_id = 2;
  string voucher_id = 3;
  string user_id = 4;
  IssuanceStatus status = 5;
  google.protobuf.Timestamp issued_at = 6;
  google.protobuf.Timestamp redeemed_at = 7;
  string order_id = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// ========================================================
// SERVICE
// ========================================================

service VoucherService {
    // List voucher campaigns (for evaluation or admin)
  rpc ListCampaigns(ListCampaignsRequest) returns (ListCampaignsResponse) {
    option (google.api.http) = {
      get: "/v1/campaigns"
    };
  }

  // Get single campaign details by code or id
  rpc GetCampaign(GetCampaignRequest) returns (VoucherCampaign) {
    option (google.api.http) = {
      get: "/v1/campaigns/{campaign_id}"
    };
  }

  // Create a new voucher (admin only)
  rpc CreateVoucher(CreateVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      post: "/v1/vouchers"
      body: "*"
    };
  }

  // Get a voucher by its unique code
  rpc GetVoucher(GetVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      get: "/v1/vouchers/{code}"
    };
  }

  // List vouchers for tenant (with optional filters)
  rpc ListVouchers(ListVouchersRequest) returns (ListVouchersResponse) {
    option (google.api.http) = {
      get: "/v1/vouchers"
    };
  }

  // Evaluate voucher eligibility using DSL/CEL
  rpc EvaluateVouchers(EvaluateVouchersRequest) returns (EvaluateVouchersResponse) {
    option (google.api.http) = {
      post: "/v1/vouchers:evaluate"
      body: "*"
    };
  }

  // Issue voucher to a specific user (manual or auto)
  rpc IssueVoucher(IssueVoucherRequest) returns (IssueVoucherResponse) {
    option (google.api.http) = {
      post: "/v1/vouchers:issue"
      body: "*"
    };
  }

  // Redeem voucher (mark as used)
  rpc RedeemVoucher(RedeemVoucherRequest) returns (VoucherIssuance) {
    option (google.api.http) = {
      post: "/v1/vouchers:redeem"
      body: "*"
    };
  }

  // List all vouchers issued to a user
  rpc ListMyVouchers(ListMyVouchersRequest) returns (ListMyVouchersResponse) {
    option (google.api.http) = {
      get: "/v1/myvouchers"
    };
  }
}

// ========================================================
// REQUESTS / RESPONSES
// ========================================================

message ListCampaignsRequest {
  string tenant_id = 1;
  bool only_active = 2; // if true, filter by start_at <= now <= end_at
  int32 limit = 3;
  int32 offset = 4;
}

message ListCampaignsResponse {
  repeated VoucherCampaign campaigns = 1;
}

message GetCampaignRequest {
  string tenant_id = 1;
  string campaign_id = 2;
}

message CreateVoucherRequest {
  string tenant_id = 1;
  Voucher voucher = 2;
}

message GetVoucherRequest {
  string tenant_id = 1;
  string code = 2;
}

message ListVouchersRequest {
  string tenant_id = 1;
  bool only_active = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListVouchersResponse {
  repeated Voucher vouchers = 1;
}

message EvaluateVouchersRequest {
  string tenant_id = 1;
  string user_id = 2;
  google.protobuf.Struct context = 3; // transaction, user, etc.
}

message EvaluateVouchersResponse {
  repeated VoucherEligibilityResult results = 1;
}

message VoucherEligibilityResult {
  string voucher_code = 1;
  bool eligible = 2;
  string reason = 3;
}

message IssueVoucherRequest {
  string tenant_id = 1;
  string user_id = 2;
  string campaign_id = 3;
  int32 count = 4; // default 1
}

message IssueVoucherResponse {
  repeated Voucher vouchers = 1;
}

message RedeemVoucherRequest {
  string tenant_id = 1;
  string user_id = 2;
  string voucher_code = 3;
  string order_id = 4;
}

message ListMyVouchersRequest {
  string tenant_id = 1;
  string user_id = 2;
  string status = 3; // optional filter
}

message ListMyVouchersResponse {
  repeated VoucherIssuance vouchers = 1;
}
