syntax = "proto3";

package smallbiznis.voucher.v1;

option go_package = "github.com/smallbiznis/smallbiznisapis/voucher/v1;voucherv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// Voucher represents a redeemable entity.
message Voucher {
  string voucher_id = 1;
  string tenant_id = 2;
  string campaign_id = 3;
  string code = 4;
  string name = 5;
  string discount_type = 6; // fixed, percent, free_item, custom
  double discount_value = 7;
  string currency = 8;
  int32 stock = 9;
  int32 remaining_stock = 10;
  google.protobuf.Timestamp expiry_date = 11;
  bool is_active = 12;
  string dsl_expression = 13; // CEL expression for eligibility
  string metadata_json = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

message VoucherCampaign {
  string campaign_id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  string type = 5; // discount, cashback, etc.
  int32 total_stock = 6;
  int32 remaining_stock = 7;
  bool is_active = 8;
  google.protobuf.Timestamp start_at = 9;
  google.protobuf.Timestamp end_at = 10;
  string metadata_json = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message VoucherIssuance {
  string issuance_id = 1;
  string tenant_id = 2;
  string voucher_id = 3;
  string user_id = 4;
  string status = 5; // issued, redeemed, expired, canceled
  google.protobuf.Timestamp issued_at = 6;
  google.protobuf.Timestamp redeemed_at = 7;
  string order_id = 8;
  string metadata_json = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// VoucherService handles all voucher operations.
service VoucherService {
  // Create a new voucher.
  rpc CreateVoucher(CreateVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      post: "/v1/vouchers"
      body: "*"
    };
  }

  // Get a voucher by code.
  rpc GetVoucher(GetVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      get: "/v1/vouchers/{code}"
    };
  }

  // List vouchers (with optional filters)
  rpc ListVouchers(ListVouchersRequest) returns (ListVouchersResponse) {
    option (google.api.http) = {
      get: "/v1/vouchers"
    };
  }

  // Evaluate eligibility of vouchers based on DSL expression.
  rpc EvaluateVouchers(EvaluateVouchersRequest) returns (EvaluateVouchersResponse) {
    option (google.api.http) = {
      post: "/v1/vouchers:evaluate"
      body: "*"
    };
  }

  // Issue voucher to a user (atomic issuance).
  rpc IssueVoucher(IssueVoucherRequest) returns (VoucherIssuance) {
    option (google.api.http) = {
      post: "/v1/vouchers:issue"
      body: "*"
    };
  }

  // Redeem a voucher (mark as used).
  rpc RedeemVoucher(RedeemVoucherRequest) returns (VoucherIssuance) {
    option (google.api.http) = {
      post: "/v1/vouchers:redeem"
      body: "*"
    };
  }
}

// ========== Requests & Responses ==========

message CreateVoucherRequest {
  string tenant_id = 1;
  Voucher voucher = 2;
}

message GetVoucherRequest {
  string tenant_id = 1;
  string code = 2;
}

message ListVouchersRequest {
  string tenant_id = 1;
  bool only_active = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListVouchersResponse {
  repeated Voucher vouchers = 1;
}

message EvaluateVouchersRequest {
  string tenant_id = 1;
  string user_id = 2;
  map<string, string> context = 3; // dynamic attributes from order
}

message EvaluateVouchersResponse {
  repeated VoucherEligibilityResult results = 1;
}

message VoucherEligibilityResult {
  string voucher_code = 1;
  bool eligible = 2;
  string reason = 3;
}

message IssueVoucherRequest {
  string tenant_id = 1;
  string user_id = 2;
  string voucher_code = 3;
}

message RedeemVoucherRequest {
  string tenant_id = 1;
  string user_id = 2;
  string voucher_code = 3;
}