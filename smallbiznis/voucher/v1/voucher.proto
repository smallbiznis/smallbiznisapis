syntax = "proto3";

package smallbiznis.voucher.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/voucher/v1;voucherv1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

// KAFKA CONSUMER:
//   topic = rule.evaluated
//   key = org_id
//   value = smallbiznis.rule.v1.RuleEvaluatedEvent

// OpenAPI (Swagger v2) top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Multi-tenant, global-ready Organization & Onboarding APIs";
    contact: { name: "SmallBiznis project"; url: "https://github.com/smallbiznis"; email: "taufiktriantono4@gmail.com"; };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

service VoucherService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Voucher"
    description: "APIs for managing customer vouchers, generated by rule engine actions."
  };

  rpc CreateVoucher(CreateVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      post: "/v1/vouchers"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "Create a voucher"
      description: "Creates a voucher for the organization specified via the required `X-Organization-ID` header."
      operation_id: "Voucher_Create"
    };
  }

  rpc GetVoucher(GetVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      get: "/v1/vouchers/{voucher_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "Get voucher"
      description: "Retrieves voucher details. Requires the `X-Organization-ID` header to resolve the tenant context."
      operation_id: "Voucher_Get"
    };
  }

  rpc ListVouchers(ListVouchersRequest) returns (ListVouchersResponse) {
    option (google.api.http) = {
      get: "/v1/vouchers"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "List vouchers"
      description: "Returns a paginated list of vouchers for the organization identified by the `X-Organization-ID` header."
      operation_id: "Voucher_List"
    };
  }

  rpc UpdateVoucher(UpdateVoucherRequest) returns (Voucher) {
    option (google.api.http) = {
      put: "/v1/vouchers/{voucher_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "Update voucher"
      description: "Updates voucher attributes for the organization provided in the `X-Organization-ID` header."
      operation_id: "Voucher_Update"
    };
  }

  rpc DeleteVoucher(DeleteVoucherRequest) returns (DeleteVoucherResponse) {
    option (google.api.http) = {
      delete: "/v1/vouchers/{voucher_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "Delete voucher"
      description: "Deletes a voucher scoped to the organization resolved from the `X-Organization-ID` header."
      operation_id: "Voucher_Delete"
    };
  }

  rpc RedeemVoucher(RedeemVoucherRequest) returns (RedeemVoucherResponse) {
    option (google.api.http) = {
      post: "/v1/vouchers:redeem"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Voucher"
      summary: "Redeem voucher"
      description: "Validates and redeems a voucher for the organization identified by the required `X-Organization-ID` header."
      operation_id: "Voucher_Redeem"
    };
  }
}

enum VoucherType {
  VOUCHER_TYPE_UNSPECIFIED = 0;
  DISCOUNT = 1;
  CASHBACK = 2;
  FREE_SHIPPING = 3;
  CUSTOM = 4;
}

enum VoucherStatus {
  VOUCHER_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  REDEEMED = 2;
  EXPIRED = 3;
  INACTIVE = 4;
}

enum DiscountType {
  DISCOUNT_TYPE_UNSPECIFIED = 0;
  FIXED = 1;
  PERCENT = 2;
}

message Voucher {
  string voucher_id = 1;
  string org_id = 2;
  string code = 3;
  VoucherType type = 4;
  VoucherStatus status = 5;
  DiscountType discount_type = 6;
  double discount_value = 7;
  google.protobuf.Timestamp expiry_date = 8;
  string issued_by_rule_id = 9;
  string issued_to_customer_id = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  map<string, string> metadata = 13;
}

message CreateVoucherRequest {
  string code = 1;
  double discount_value = 2;
  DiscountType discount_type = 3;
  google.protobuf.Timestamp expiry_date = 4;
  string customer_id = 5;
}

message GetVoucherRequest {
  string voucher_id = 1;
}

message UpdateVoucherRequest {
  string voucher_id = 1;
  string code = 2;
  VoucherStatus status = 3;
  double discount_value = 4;
  DiscountType discount_type = 5;
  google.protobuf.Timestamp expiry_date = 6;
  string customer_id = 7;
  map<string, string> metadata = 8;
}

message DeleteVoucherRequest {
  string voucher_id = 1;
}

message DeleteVoucherResponse {}

message RedeemVoucherRequest {
  string voucher_code = 1;
  string customer_id = 2;
}

message RedeemVoucherResponse {
  Voucher voucher = 1;
  bool success = 2;
  string message = 3;
}

message ListVouchersRequest {
  smallbiznis.common.CursorRequest page = 1;
}

message ListVouchersResponse {
  repeated Voucher vouchers = 1;
  smallbiznis.common.CursorResponse page = 2;
}
