syntax = "proto3";

package smallbiznis.workflow.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/workflow/v1;workflowv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/field_mask.proto";
import "google/api/annotations.proto";

import "protoc-gen-openapiv2/options/annotations.proto";
import "smallbiznis/common/pagination.proto";

// OpenAPI (Swagger v2) top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test"
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

service WorkflowService {

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Workflow"
    description: "APIs for manage workflow (create, update, list, delete)"
  };

  rpc ListFlowTemplate(ListFlowTemplatesRequest) returns (ListFlowTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/flow-templates"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_List_Template"
      summary: "List workflow templates"
      description: "Returns a paginated list of workflow templates. Use query parameters such as `cursor` and `limit` when available."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc GetFlowTemplate(GetFlowTemplateRequest) returns (FlowTemplate) {
    option (google.api.http) = {
      get: "/v1/flow-templates/{id}"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_Get_Flow_Template"
      summary: "Get flow template details"
      description: "Retrieves an workflow by its unique identifier. Returns 404 if the workflow does not exist."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc ListFlow(ListFlowsRequest) returns (ListFlowsResponse) {
    option (google.api.http) = {
      get: "/v1/flows"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_List"
      summary: "List workflows"
      description: "Return a paginated list of workflow definitions."
      // Uncomment if you use JWT/Bearer
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc CreateFlow(CreateFlowRequest) returns (Flow) {
    option (google.api.http) = {
      post: "/v1/flows"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_Create"
      summary: "Create an workflow"
      description: "Creates a new workflow with the provided attributes. Returns the created workflow on success."
      // Uncomment if you use JWT/Bearer
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc GetFlow(GetFlowRequest) returns (Flow) {
    option (google.api.http) = {
      get: "/v1/flows/{id}"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_Get"
      summary: "Get workflow details"
      description: "Retrieves an workflow by its unique identifier. Returns 404 if the workflow does not exist."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

  rpc UpdateFlow(UpdateFlowRequest) returns (Flow) {
    option (google.api.http) = {
      patch: "/v1/flows/{id}"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Workflow"
      operation_id: "Workflow_Update"
      summary: "Update an workflow"
      description: "Updates mutable fields of an existing workflow. Returns the updated resource on success."
      // security: { security_requirement: { key: "BearerAuth" } }
    };
  }

}

message ListFlowTemplatesRequest {
  string organization_id = 1;
  FlowStatus status = 2;
  string trigger = 3;
  smallbiznis.common.CursorRequest page = 4;
}

message ListFlowTemplatesResponse {
  repeated FlowTemplate data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message GetFlowTemplateRequest {
  string id = 1;
}

message ListFlowsRequest {
  string organization_id = 1;
  FlowStatus status = 2;
  string trigger = 3;
  smallbiznis.common.CursorRequest page = 4;
}

message ListFlowsResponse {
  repeated Flow data = 1;
  smallbiznis.common.CursorResponse page = 2;
}

message CreateFlowRequest {

  string organization_id = 1;

  string name = 2;

  string description = 3;

  FlowStatus status = 4;

  repeated Node nodes = 5;

  repeated Edge edges = 6;

  Overflow overflow = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

}

message GetFlowRequest {
  string id = 1;
}

message UpdateFlowRequest {
  string id = 1;
  Flow flow = 2;
  google.protobuf.FieldMask update_mask = 3;
}

// --- RESOURCE ---
enum FlowStatus {
  UNSPECIFIED = 0;
  ACTIVE = 1;
  INACTIVE = 2;
  ARCHIVED = 3;
}

message FlowTemplate {

  string id = 1;

  string name = 2;

  string description = 3;

  FlowStatus status = 4;

  repeated Node nodes = 5;

  repeated Edge edges = 6;

  Overflow overflow = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

  string trigger = 10;

}

message Flow {

  string id = 1;

  string organization_id = 2;

  string name = 3;

  string description = 4;

  FlowStatus status = 5;

  repeated Node nodes = 6;

  repeated Edge edges = 7;

  Overflow overflow = 8;

  google.protobuf.Timestamp created_at = 9;

  google.protobuf.Timestamp updated_at = 10;

}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  TRIGGER = 1;
  CONDITION = 2;
  ACTION = 3;
}

enum TriggerType {

  LOGIN = 0;

  REGISTER = 1;

  TRANSACTION = 2;

}

message NodeTrigger {

  TriggerType key = 1;

  string label = 2;

  string description = 3;

}

message Condition {

  string field = 1;
  
  string operator = 2;

  google.protobuf.Value value = 3;

}

message NodeCondition {

  repeated Condition conditions = 1;

}

enum ActionType {

  ACTION_TYPE_UNSPECIFIED = 0;

  REWARD_POINT = 1;

  REWARD_VOUCHER = 2;

  REWARD_ITEM = 3;

  SEND_NOTIFICATION = 4;

  WEBHOOK = 5;

}

enum RewardPointType {

  REWARD_POINT_TYPE_UNSPECIFIED = 0;
  FIXED       = 1; // grant N points
  MULTIPLE    = 2; // generic multiply
  PERCENT_BPS = 3; // points = amount * (bps/10000)
  PER_UNIT    = 4; // points = floor(amount / unit_amount) * points_per_unit

}

enum CapPeriod {
  CAP_PERIOD_UNSPECIFIED = 0;
  DAY = 1;
  MONTH = 2;
  YEAR = 3;
}

message RewardPointCap {
  CapPeriod period = 1; // day, month, year
  int64 value = 2; // max points per period
  string timezone = 3; // Asia/Jakarta or tz from org
}

message RewardPoint {
  RewardPointType reward_point_type = 1;
  double reward_point_value = 2;
  int64 unit_amount = 3;
  int64 expiry_days = 4; // 1 s/d 365
  RewardPointCap cap = 5;
}

message NodeAction {

  ActionType type = 1;

  google.protobuf.Struct parameters = 3;

}

message Node {

  string id = 1;

  NodeType type = 2;

  google.protobuf.Struct data = 3;

  Position position = 6;

}

enum EdgeType {
  EDGE_TYPE_UNSPECIFIED = 0;

  THEN = 1;

  OTHERWISE = 2;
}

message Edge {

  string id = 1;

  EdgeType type = 2;

  string source = 3;

  string target = 4;

}

message Position {

  float x = 1;

  float y = 2;

}

message Overflow {

  float x = 1;

  float y = 2;

  float zoom = 3;
  
}
