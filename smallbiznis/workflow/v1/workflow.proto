syntax = "proto3";

package smallbiznis.workflow.v1;
option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/workflow/v1;workflowv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// =======================
// ENUMS
// =======================
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  ACTIVE = 2;
  INACTIVE = 3;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  RUNNING = 1;
  SUCCESS = 2;
  FAILED = 3;
}

enum WorkflowNodeType {
  WORKFLOW_NODE_TYPE_UNSPECIFIED = 0;
  TRIGGER = 1;
  CONDITION = 2;
  ACTION = 3;
  WAIT = 4;
}

enum ConnectorType {
  CONNECTOR_TYPE_UNSPECIFIED = 0;
  PRODUCT = 1;        // internal app: loyalty, voucher
  COMMUNICATION = 2;  // Gmail, WhatsApp, Telegram
  CALENDAR = 3;       // Google Calendar
  UTILITY = 4;        // Webhook, Schedule, Delay
  LOGIC = 5;          // Built-in (Condition, Split, Path)
}

// =======================
// WORKFLOW CORE ENTITIES
// =======================
message WorkflowDefinition {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  WorkflowStatus status = 5;
  int32 version = 6;
  google.protobuf.Struct flow_json = 7;
  google.protobuf.Timestamp published_at = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message WorkflowNode {
  string id = 1;
  string workflow_id = 2;
  string node_id = 3;
  WorkflowNodeType type = 4;
  string label = 5;
  string app_id = 6;        // connector app id, e.g. gmail
  string method_key = 7;    // trigger/action key, e.g. new_email
  google.protobuf.Struct config = 8;
  string condition_expression = 9;
  string wait_duration = 10;
  string next_on_success = 11;
  string next_on_failure = 12;
  google.protobuf.Struct position = 13;
  google.protobuf.Timestamp created_at = 14;
}

message WorkflowEdge {
  string id = 1;
  string workflow_id = 2;
  string source = 3;
  string target = 4;
  string label = 5;
  google.protobuf.Timestamp created_at = 6;
}

message WorkflowRun {
  string id = 1;
  string workflow_id = 2;
  string tenant_id = 3;
  string trigger_event = 4;
  google.protobuf.Struct trigger_payload = 5;
  WorkflowRunStatus status = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp completed_at = 8;
}

message WorkflowNodeRun {
  string id = 1;
  string run_id = 2;
  string node_id = 3;
  WorkflowNodeType type = 4;
  string app_id = 5;
  string method_key = 6;
  google.protobuf.Struct input = 7;
  google.protobuf.Struct output = 8;
  WorkflowRunStatus status = 9;
  string error_message = 10;
  google.protobuf.Timestamp executed_at = 11;
}

// =======================
// CONNECTOR SYSTEM
// =======================

message WorkflowConnector {
  string id = 1;
  string tenant_id = 2;
  string app_id = 3;              // e.g. gmail
  string developer = 4;           // e.g. Google LLC
  string name = 5;                // e.g. Gmail
  ConnectorType category = 6;     // e.g. COMMUNICATION
  string description = 7;
  string homepage_url = 8;
  string icon_url = 9;
  ConnectorManifest manifest = 10;
  repeated string scopes = 11;
  bool is_published = 12;
  bool verified = 13;
  double rating = 14;
  int64 install_count = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

// =======================
// CONNECTOR MANIFEST
// =======================
message ConnectorManifest {
  repeated ConnectorTrigger triggers = 1;
  repeated ConnectorAction actions = 2;
  repeated ConnectorSearch searches = 3;
}

message ConnectorTrigger {
  string key = 1;                 // e.g. new_email
  string label = 2;               // e.g. New Email
  string description = 3;
  string type = 4;                // polling | instant
  repeated ConnectorParam parameters = 5;
  google.protobuf.Struct sample_output = 6;
}

message ConnectorAction {
  string key = 1;                 // e.g. send_email
  string label = 2;               // e.g. Send Email
  string description = 3;
  repeated ConnectorParam parameters = 4;
  google.protobuf.Struct sample_output = 5;
}

message ConnectorSearch {
  string key = 1;
  string label = 2;
  string description = 3;
  repeated ConnectorParam parameters = 4;
  google.protobuf.Struct sample_output = 5;
}

message ConnectorParam {
  string key = 1;
  string label = 2;
  string type = 3;                // string | number | boolean | select | json
  bool required = 4;
  repeated ConnectorOption options = 5;
}

message ConnectorOption {
  string label = 1;
  string value = 2;
}

// =======================
// INSTALLATION PER TENANT
// =======================
message WorkflowConnectorInstall {
  string id = 1;
  string tenant_id = 2;
  int64 connector_id = 3;
  string install_token = 4;
  google.protobuf.Struct settings = 5;
  string external_account = 6;
  string account_label = 7;
  bool is_enabled = 8;
  google.protobuf.Timestamp installed_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// =======================
// EVENT SUBSCRIPTIONS
// =======================
message WorkflowConnectorEvent {
  string id = 1;
  string connector_id = 2;
  string event_key = 3;           // e.g. new_email
  string target_url = 4;
  google.protobuf.Struct sample_payload = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
}

// OpenAPI top-level config
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SmallBiznis API";
    version: "1.0";
    description: "Multi-tenant, global-ready Organization & Onboarding APIs";
    contact: {
      name: "SmallBiznis project";
      url: "https://github.com/smallbiznis";
      email: "taufiktriantono4@gmail.com";
    };
  };
  host: "api.smallbiznis.test";
  schemes: HTTPS;
  base_path: "/api";
  consumes: "application/json";
  produces: "application/json";
};

// =======================
// SERVICE DEFINITIONS
// =======================
service WorkflowService {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
      name: "Workflow"
      description: "API for managing workflow"
    };

    // ---- WORKFLOW CRUD ----
    rpc ListDefinitions (ListDefinitionsRequest) returns (ListDefinitionsResponse) {
      option (google.api.http) = {
        post: "/v1/workflows"
        body: "*"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Workflow"
        summary: "Create a new workflow"
        description: ""
        operation_id: "Workflow_Create"
      };
    };

    rpc GetDefinition (GetDefinitionRequest) returns (WorkflowDefinition) {
      option (google.api.http) = {
        get: "/v1/workflows/{id}"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Workflow"
        summary: "Get a workflow"
        description: ""
        operation_id: "Workflow_Get"
      };
    };

    rpc CreateDefinition (CreateDefinitionRequest) returns (WorkflowDefinition) {
      option (google.api.http) = {
        post: "/v1/workflows"
        body: "*"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Workflow"
        summary: "Create a new workflow"
        description: ""
        operation_id: "Workflow_Create"
      };
    };

    rpc UpdateDefinition (UpdateDefinitionRequest) returns (WorkflowDefinition) {
      option (google.api.http) = {
        put: "/v1/workflows/{definition.id}"
        body: "*"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Workflow"
        summary: "Update a workflow"
        description: ""
        operation_id: "Workflow_Update"
      };
    };

    rpc DeleteDefinition (DeleteDefinitionRequest) returns (google.protobuf.Struct) {
      option (google.api.http) = {
        delete: "/v1/workflows/{id}"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Workflow"
        summary: "Delete a workflow"
        description: ""
        operation_id: "Workflow_Delete"
      };
    };

    // ---- CONNECTORS ----
    rpc ListConnectors (ListConnectorsRequest) returns (ListConnectorsResponse) {
      option (google.api.http) = {
        get: "/v1/connectors"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "List connectors"
        description: ""
        operation_id: "Connector_List"
      };
    };

    rpc GetConnector (GetConnectorRequest) returns (WorkflowConnector) {
      option (google.api.http) = {
        get: "/v1/connectors/{id}"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "Get a connector"
        description: ""
        operation_id: "Connector_Get"
      };
    };

    rpc ListConnectorTriggers (GetConnectorRequest) returns (ListConnectorTriggersResponse) {
      option (google.api.http) = {
        get: "/v1/connectors/{id}/triggers"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "List connector triggers"
        description: ""
        operation_id: "Connector_ListTriggers"
      };
    };

    rpc ListConnectorActions (GetConnectorRequest) returns (ListConnectorActionsResponse) {
      option (google.api.http) = {
        get: "/v1/connectors/{id}/actions"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "List connector actions"
        description: ""
        operation_id: "Connector_ListActions"
      };
    };

    // ---- INSTALLATIONS ----
    rpc ListInstalls (ListInstallsRequest) returns (ListInstallsResponse) {
      option (google.api.http) = {
        get: "/v1/tenants/{tenant_id}/connectors:installs"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "List connector installations"
        description: ""
        operation_id: "Connector_ListInstalls"
      };
    };

    rpc CreateInstall (CreateInstallRequest) returns (WorkflowConnectorInstall) {
      option (google.api.http) = {
        post: "/v1/tenants/{tenant_id}/connectors:installs"
        body: "*"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Connector"
        summary: "Create connector installation"
        description: ""
        operation_id: "Connector_CreateInstall"
      };
    };

    // rpc DeleteInstall (DeleteInstallRequest) returns (google.protobuf.Empty) {
    //   option (google.api.http) = {
    //     delete: "/v1/connectors/{id}/installs/{install_id}"
    //   };

    //   option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
    //     tags: "Connector"
    //     summary: "Delete connector installation"
    //     description: ""
    //     operation_id: "Connector_DeleteInstall"
    //   };
    // };

    // ---- RUNS ----
    rpc ListRuns (ListRunsRequest) returns (ListRunsResponse) {
      option (google.api.http) = {
        get: "/v1/runs"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Run"
        summary: "List workflow runs"
        description: ""
        operation_id: "Run_ListRuns"
      };
    };

    rpc GetRun (GetRunRequest) returns (WorkflowRun) {
      option (google.api.http) = {
        get: "/v1/runs/{id}"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Run"
        summary: "Get workflow run"
        description: ""
        operation_id: "Run_GetRun"
      };
    };

    rpc ReplayRun (ReplayRunRequest) returns (WorkflowRun) {
      option (google.api.http) = {
        post: "/v1/runs/{id}:replay"
        body: "*"
      };

      option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
        tags: "Run"
        summary: "Replay workflow run"
        description: ""
        operation_id: "Run_ReplayRun"
      };
    };
}

message ListDefinitionsRequest {
  string tenant_id = 1;
}

message ListDefinitionsResponse {
  repeated WorkflowDefinition items = 1;
}

message GetDefinitionRequest {
  string id = 1;
}

message CreateDefinitionRequest {
  WorkflowDefinition definition = 1;
}

message UpdateDefinitionRequest {
  WorkflowDefinition definition = 1;
}

message DeleteDefinitionRequest {
  string id = 1;
}

message ListConnectorsRequest {
  string tenant_id = 1;
  string category = 2;
  bool only_published = 3;
}
message ListConnectorsResponse {
  repeated WorkflowConnector connectors = 1;
}
message GetConnectorRequest {
  string id = 1;
}
message ListConnectorTriggersResponse {
  repeated ConnectorTrigger triggers = 1;
}
message ListConnectorActionsResponse {
  repeated ConnectorAction actions = 1;
}

message ListInstallsRequest {
  string tenant_id = 1;
}
message ListInstallsResponse {
  repeated WorkflowConnectorInstall installs = 1;
}
message CreateInstallRequest {
  WorkflowConnectorInstall install = 1;
}
message DeleteInstallRequest {
  string id = 1;
}

message ListRunsRequest {
  string workflow_id = 1;
  string tenant_id = 2;
}
message ListRunsResponse {
  repeated WorkflowRun runs = 1;
}
message GetRunRequest {
  string id = 1;
}
message ReplayRunRequest {
  string run_id = 1;
}
