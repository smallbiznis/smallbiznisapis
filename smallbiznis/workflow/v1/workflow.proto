syntax = "proto3";

package smallbiznis.workflow.v1;

option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/workflow/v1;workflowv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/annotations.proto";

service Service {

  rpc ListFlowTemplates(ListFlowTemplatesRequest) returns (ListFlowTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/flow-templates"
    };
  }

  rpc GetFlowTemplate(GetFlowTemplateRequest) returns (FlowTemplate) {
    option (google.api.http) = {
      get: "/v1/flow-templates/{id}"
    };
  }

  rpc ListFlows(ListFlowsRequest) returns (ListFlowsResponse) {
    option (google.api.http) = {
      get: "/v1/flows"
    };
  }

  rpc CreateFlow(CreateFlowRequest) returns (Flow) {
    option (google.api.http) = {
      post: "/v1/flows"
      body: "*"
    };
  }

  rpc GetFlow(GetFlowRequest) returns (Flow) {
    option (google.api.http) = {
      get: "/v1/flows/{id}"
    };
  }

  rpc UpdateFlow(UpdateFlowRequest) returns (Flow) {
    option (google.api.http) = {
      patch: "/v1/flows/{id}"
      body: "*"
    };
  }

}

message ListFlowTemplatesRequest {
  string organization_id = 1;
  FlowStatus status = 2;
  string trigger = 3;
}

message ListFlowTemplatesResponse {
  repeated FlowTemplate data = 1;
}

message GetFlowTemplateRequest {
  string id = 1;
}

message ListFlowsRequest {
  string organization_id = 1;
  FlowStatus status = 2;
  string trigger = 3;
}

message ListFlowsResponse {
  repeated Flow data = 1;
}

message CreateFlowRequest {

  string organization_id = 1;

  string name = 2;

  string description = 3;

  FlowStatus status = 4;

  repeated Node nodes = 5;

  repeated Edge edges = 6;

  Overflow overflow = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

}

message GetFlowRequest {
  string id = 1;
}

message UpdateFlowRequest {
  string id = 1;
  Flow flow = 2;
}

// --- RESOURCE ---
enum FlowStatus {
  FLOW_STATUS_UNSPECIFIED = 0;
  FLOW_STATUS_ACTIVE = 1;
  FLOW_STATUS_INACTIVE = 2;
  FLOW_STATUS_ARCHIVED = 3;
}

message FlowTemplate {

  string id = 1;

  string name = 2;

  string description = 3;

  FlowStatus status = 4;

  repeated Node nodes = 5;

  repeated Edge edges = 6;

  Overflow overflow = 7;

  google.protobuf.Timestamp created_at = 8;

  google.protobuf.Timestamp updated_at = 9;

  string trigger = 10;

}

message Flow {

  string id = 1;

  string organization_id = 2;

  string name = 3;

  string description = 4;

  FlowStatus status = 5;

  repeated Node nodes = 6;

  repeated Edge edges = 7;

  Overflow overflow = 8;

  google.protobuf.Timestamp created_at = 9;

  google.protobuf.Timestamp updated_at = 10;

}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_TRIGGER = 1;
  NODE_TYPE_CONDITION = 2;
  NODE_TYPE_ACTION = 3;
}

enum TriggerType {

  TRIGGER_TYPE_LOGIN = 0;

  TRIGGER_TYPE_REGISTER = 1;

  TRIGGER_TYPE_TRANSACTION = 2;

}

message NodeTrigger {

  TriggerType key = 1;

  string label = 2;

  string description = 3;

}

message Condition {

  string field = 1;
  
  string operator = 2;

  google.protobuf.Value value = 3;

}

message NodeCondition {

  repeated Condition conditions = 1;

}

enum ActionType {

  ACTION_TYPE_UNSPECIFIED = 0;

  ACTION_TYPE_REWARD_POINT = 1;

  ACTION_TYPE_REWARD_VOUCHER = 2;

  ACTION_TYPE_REWARD_ITEM = 3;

  ACTION_TYPE_SEND_NOTIFICATION = 4;

  ACTION_TYPE_WEBHOOK = 5;

}

enum RewardPointType {

  REWARD_POINT_UNSPECIFIED = 0;
  REWARD_POINT_FIXED       = 1; // grant N points
  REWARD_POINT_MULTIPLE    = 2; // generic multiply
  REWARD_POINT_PERCENT_BPS = 3; // points = amount * (bps/10000)
  REWARD_POINT_PER_UNIT    = 4; // points = floor(amount / unit_amount) * points_per_unit

}

enum CapPeriod {
  CAP_PERIOD_UNSPECIFIED = 0;
  CAP_PERIOD_DAY = 1;
  CAP_PERIOD_MONTH = 2;
  CAP_PERIOD_YEAR = 3;
}

message RewardPointCap {
  CapPeriod period = 1; // day, month, year
  int64 value = 2; // max points per period
  string timezone = 3; // Asia/Jakarata or tz from org
}

message RewardPoint {
  RewardPointType reward_point_type = 1;
  double reward_point_value = 2;
  int64 unit_amount = 3;
  int64 expiry_days = 4; // 1 s/d 365
  RewardPointCap cap = 5;
}

message NodeAction {

  ActionType type = 1;

  google.protobuf.Struct parameters = 3;

}

message Node {

  string id = 1;

  NodeType type = 2;

  google.protobuf.Struct data = 3;

  Position position = 6;

}

enum EdgeType {
  EDGE_TYPE_UNSPECIFIED = 0;

  EDGE_TYPE_THEN = 1;

  EDGE_TYPE_OTHERWISE = 2;
}

message Edge {

  string id = 1;

  string type = 2;

  string source = 3;

  string target = 4;

}

message Position {

  float x = 1;

  float y = 2;

}

message Overflow {

  float x = 1;

  float y = 2;

  float zoom = 3;
  
}