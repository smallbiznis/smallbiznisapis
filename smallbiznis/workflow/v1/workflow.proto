syntax = "proto3";

package smallbiznis.workflow.v1;
option go_package = "github.com/smallbiznis/go-genproto/smallbiznis/workflow/v1;workflowv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// =====================================================
// ENUMS
// =====================================================
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  ACTIVE = 2;
  INACTIVE = 3;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  RUNNING = 1;
  SUCCESS = 2;
  FAILED = 3;
}

enum WorkflowNodeType {
  WORKFLOW_NODE_TYPE_UNSPECIFIED = 0;
  TRIGGER = 1;
  ACTION = 2;
  CONDITION = 3;
  WAIT = 4;
}

enum ConnectorType {
  CONNECTOR_TYPE_UNSPECIFIED = 0;
  PRODUCT = 1;
  COMMUNICATION = 2;
  CALENDAR = 3;
  UTILITY = 4;
  LOGIC = 5;
}

// =====================================================
// CORE ENTITIES
// =====================================================
message WorkflowDefinition {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  WorkflowStatus status = 5;
  int32 version = 6;
  google.protobuf.Timestamp published_at = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// =====================================================
// GRAPH ENTITIES (permanent tables)
// =====================================================
message WorkflowNode {
  string id = 1;
  string workflow_id = 2;
  WorkflowNodeType type = 3;
  string label = 4;
  string app_id = 5;                  // connector app id (e.g. whatsapp)
  string method_key = 6;              // trigger/action key
  google.protobuf.Struct config = 7;  // JSON config per node
  string condition_expression = 8;
  string wait_duration = 9;
  string next_on_success = 10;
  string next_on_failure = 11;
  google.protobuf.Struct position = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message WorkflowEdge {
  string id = 1;
  string workflow_id = 2;
  string source = 3;
  string target = 4;
  string label = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// =====================================================
// WORKFLOW RUNTIME
// =====================================================
message WorkflowRun {
  string id = 1;
  string workflow_id = 2;
  string tenant_id = 3;
  string trigger_event = 4;
  google.protobuf.Struct trigger_payload = 5;
  WorkflowRunStatus status = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp completed_at = 8;
}

message WorkflowNodeRun {
  string id = 1;
  string run_id = 2;
  string node_id = 3;
  WorkflowNodeType type = 4;
  string app_id = 5;
  string method_key = 6;
  google.protobuf.Struct input = 7;
  google.protobuf.Struct output = 8;
  WorkflowRunStatus status = 9;
  string error_message = 10;
  google.protobuf.Timestamp executed_at = 11;
}

// =====================================================
// CONNECTOR SYSTEM
// =====================================================
message WorkflowConnector {
  string id = 1;
  string tenant_id = 2;
  string app_id = 3;
  string developer = 4;
  string name = 5;
  ConnectorType category = 6;
  string description = 7;
  string homepage_url = 8;
  string icon_url = 9;
  ConnectorManifest manifest = 10;
  repeated string scopes = 11;
  bool is_published = 12;
  bool verified = 13;
  double rating = 14;
  int64 install_count = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
  bool is_default = 18;
}

message ConnectorManifest {
  repeated ConnectorTrigger triggers = 1;
  repeated ConnectorAction actions = 2;
  repeated ConnectorSearch searches = 3;
}

message ConnectorTrigger {
  string key = 1;
  string label = 2;
  string description = 3;
  string type = 4;
  repeated ConnectorParam parameters = 5;
  google.protobuf.Struct sample_input = 6;
  google.protobuf.Struct sample_output = 7;
}

message ConnectorAction {
  string key = 1;
  string label = 2;
  string description = 3;
  repeated ConnectorParam parameters = 4;
  google.protobuf.Struct sample_input = 5;
  google.protobuf.Struct sample_output = 6;
}

message ConnectorSearch {
  string key = 1;
  string label = 2;
  string description = 3;
  repeated ConnectorParam parameters = 4;
  google.protobuf.Struct sample_output = 5;
}

message ConnectorParam {
  string key = 1;
  string label = 2;
  string type = 3;
  bool required = 4;
  repeated ConnectorOption options = 5;
}

message ConnectorOption {
  string label = 1;
  string value = 2;
}

// =====================================================
// INSTALLATION PER TENANT
// =====================================================
message WorkflowConnectorInstall {
  string id = 1;
  string tenant_id = 2;
  string connector_id = 3;
  string install_token = 4;
  google.protobuf.Struct settings = 5;
  string external_account = 6;
  string account_label = 7;
  bool is_enabled = 8;
  google.protobuf.Timestamp installed_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// =====================================================
// EVENT SUBSCRIPTIONS
// =====================================================
message WorkflowConnectorEvent {
  string id = 1;
  string connector_id = 2;
  string event_key = 3;
  string target_url = 4;
  google.protobuf.Struct sample_payload = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
}

// =====================================================
// SERVICE: WORKFLOW DEFINITIONS
// =====================================================
service WorkflowService {
  rpc ListDefinitions (ListDefinitionsRequest) returns (ListDefinitionsResponse) {
    option (google.api.http) = { get: "/v1/workflows" };
  }

  rpc GetDefinition (GetDefinitionRequest) returns (WorkflowDefinition) {
    option (google.api.http) = { get: "/v1/workflows/{id}" };
  }

  rpc CreateDefinition (CreateDefinitionRequest) returns (WorkflowDefinition) {
    option (google.api.http) = { post: "/v1/workflows" body: "*" };
  }

  rpc UpdateDefinition (UpdateDefinitionRequest) returns (WorkflowDefinition) {
    option (google.api.http) = { put: "/v1/workflows/{definition.id}" body: "*" };
  }

  rpc DeleteDefinition (DeleteDefinitionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/workflows/{id}" };
  }

  rpc ListRuns (ListRunsRequest) returns (ListRunsResponse) {
    option (google.api.http) = { get: "/v1/runs" };
  }

  rpc GetRun (GetRunRequest) returns (WorkflowRun) {
    option (google.api.http) = { get: "/v1/runs/{run_id}" };
  }

  rpc ReplayRun (ReplayRunRequest) returns (WorkflowRun) {
    option (google.api.http) = { post: "/v1/runs/{run_id}:replay" body: "*" };
  }


  rpc ListNodes (ListNodesRequest) returns (ListNodesResponse) {
    option (google.api.http) = { get: "/v1/workflows/{workflow_id}/nodes" };
  }

  // =====================================================
  // WORKFLOW GRAPH (Nodes & Edges CRUD)
  // =====================================================
  rpc CreateNode (CreateNodeRequest) returns (WorkflowNode) {
    option (google.api.http) = { post: "/v1/workflows/{workflow_id}/nodes" body: "*" };
  }

  rpc UpdateNode (UpdateNodeRequest) returns (WorkflowNode) {
    option (google.api.http) = { patch: "/v1/nodes/{id}" body: "*" };
  }

  rpc DeleteNode (DeleteNodeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/nodes/{id}" };
  }

  rpc ListEdges (ListEdgesRequest) returns (ListEdgesResponse) {
    option (google.api.http) = { get: "/v1/workflows/{workflow_id}/edges" };
  }

  rpc CreateEdge (CreateEdgeRequest) returns (WorkflowEdge) {
    option (google.api.http) = { post: "/v1/workflows/{workflow_id}/edges" body: "*" };
  }

  rpc DeleteEdge (DeleteEdgeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/edges/{id}" };
  }
}

// =====================================================
// REQUESTS & RESPONSES
// =====================================================
message ListDefinitionsRequest {
  string tenant_id = 1;
}
message ListDefinitionsResponse {
  repeated WorkflowDefinition items = 1;
}
message GetDefinitionRequest { string id = 1; }
message CreateDefinitionRequest { WorkflowDefinition definition = 1; }
message UpdateDefinitionRequest { WorkflowDefinition definition = 1; }
message DeleteDefinitionRequest { string id = 1; }

message ListNodesRequest { string workflow_id = 1; }
message ListNodesResponse { repeated WorkflowNode nodes = 1; }
message CreateNodeRequest {
  string workflow_id = 1;
  string type = 2;
  string label = 3;
  string app_id = 4;
  string method_key = 5;
}
message UpdateNodeRequest {
  string id = 1;
  google.protobuf.Struct config = 2;
  string label = 3;
  string app_id = 4;
  string method_key = 5;
  string condition_expression = 6;
  string wait_duration = 7;
  string next_on_success = 8;
  string next_on_failure = 9;
}
message DeleteNodeRequest { string id = 1; }

message ListEdgesRequest { string workflow_id = 1; }
message ListEdgesResponse { repeated WorkflowEdge edges = 1; }
message CreateEdgeRequest {
  string workflow_id = 1;
  string source = 2;
  string target = 3;
  string label = 4;
}
message DeleteEdgeRequest { string id = 1; }

message ListRunsRequest {
  string workflow_id = 1;
  string tenant_id = 2;
}
message ListRunsResponse { repeated WorkflowRun runs = 1; }
message GetRunRequest { string run_id = 1; }
message ReplayRunRequest { string run_id = 1; }
